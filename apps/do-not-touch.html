<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>DO NOT TOUCH — v68 Pixel City Story Mode</title>
<style>
:root{--bg:#d8efe7;--ink:#0f1b2d;--line:#1c2f47;--panel:#eef5ff}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,Segoe UI,Arial,sans-serif}
#game{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;background:#9ecf86}
.ui{position:fixed;inset:0;pointer-events:none}
.topbar{position:fixed;left:10px;right:10px;top:calc(env(safe-area-inset-top,0px)+8px);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;z-index:8;pointer-events:none}
.brand{background:transparent;color:#fff;padding:2px 2px;font-weight:900;letter-spacing:.03em;text-shadow:2px 2px 0 #000, -1px -1px 0 rgba(0,0,0,.35);line-height:.9;font-size:1.9rem}
.top-actions{display:flex;gap:8px;pointer-events:auto}
.btn{border:3px solid #1e2e48;background:#f7faff;color:#111;padding:8px 16px;border-radius:0;font-weight:900;font-size:1.05rem;box-shadow:4px 4px 0 rgba(30,46,72,.55),inset 0 1px 0 #fff;font-family:monospace}
.btn:active{transform:translateY(1px)}
.logo-badge{position:fixed;left:10px;top:calc(env(safe-area-inset-top,0px)+8px);width:86px;height:86px;border-radius:999px;background:radial-gradient(circle at 35% 30%,#ffffff 0,#d7dff0 48%,#8b99b5 100%);border:4px solid #f8fbff;box-shadow:0 0 0 3px #2b3f63, 2px 2px 0 rgba(0,0,0,.35);z-index:9;display:grid;place-items:center;color:#243a5a;font-weight:900;font-size:.8rem;letter-spacing:.03em;line-height:.9;text-align:center}
.joystick{position:fixed;right:12px;bottom:calc(env(safe-area-inset-bottom,0px)+16px);width:132px;height:132px;border-radius:999px;background:rgba(20,26,40,.66);border:5px solid #0d121b;z-index:8;pointer-events:auto;touch-action:none;box-shadow:inset 0 0 0 3px #4c5667}
.stick{position:absolute;left:50%;top:50%;width:58px;height:58px;margin-left:-29px;margin-top:-29px;border-radius:999px;background:#c62f2f;border:4px solid #3c0f0f;box-shadow:0 0 0 2px rgba(255,255,255,.28) inset}
.minimap{position:fixed;left:12px;bottom:calc(env(safe-area-inset-bottom,0px)+16px);width:112px;height:112px;border-radius:6px;background:#d8e1ef;border:4px solid #273b5e;z-index:8;overflow:hidden;pointer-events:none;box-shadow:3px 3px 0 rgba(0,0,0,.4)}
.minimap canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.modal{position:fixed;inset:0;display:none;place-items:center;padding:14px;background:rgba(2,8,20,.7);z-index:20}
.modal.open{display:grid}
.card{width:min(760px,96vw);max-height:82vh;overflow:auto;background:#0f1b34;color:#e7f0ff;border:2px solid #5a79ac;border-radius:12px;padding:14px}
.card h3{margin:.2rem 0 .4rem}
.card ul{margin:.2rem 0 .6rem;padding-left:18px}
.stat-row{display:grid;grid-template-columns:150px 1fr 44px;gap:8px;align-items:center;margin:6px 0;font-size:.86rem}
.stat-meter{height:10px;border:1px solid #6587be;border-radius:999px;overflow:hidden;background:#132544}
.stat-meter>span{display:block;height:100%;background:linear-gradient(90deg,#71d8ff,#94ffaf)}
.toast{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top,0px)+62px);z-index:30;background:rgba(8,14,28,.92);color:#e5eeff;border:1px solid #5a78ad;border-radius:999px;padding:8px 12px;font-size:.8rem;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
@media (max-width:820px){
  .brand{display:none}
  .btn{padding:7px 12px;font-size:.86rem}
  .logo-badge{width:72px;height:72px;font-size:.66rem}
  .joystick{width:120px;height:120px}
  .stick{width:52px;height:52px;margin-left:-26px;margin-top:-26px}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui">
  <div class="logo-badge">MICHAEL<br/>COSTEA</div>
  <div class="topbar">
    <div class="brand"></div>
    <div class="top-actions">
      <button class="btn" id="mapBtn">MAP</button>
      <button class="btn" id="menuBtn">MENU</button>
    </div>
  </div>
  <div class="minimap"><canvas id="mini" width="110" height="110"></canvas></div>
  <div class="joystick" id="joy"><div class="stick" id="stick"></div></div>
  <div class="toast" id="toast"></div>
</div>

<div class="modal" id="menuModal">
  <div class="card">
    <h3>DO NOT TOUCH // MENU</h3>
    <p>Presentation-safe build: top-down movement, no forced interrupts, no death/fall states.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" id="jumpNext">Jump to Next Chapter</button>
      <button class="btn" id="openStatsFromMenu">Character Stats</button>
      <button class="btn" id="backSite">Back to MichaelOS</button>
      <button class="btn" id="closeMenu">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="mapModal">
  <div class="card">
    <h3>City Map / Chapter Progress</h3>
    <ul id="mapList"></ul>
    <button class="btn" id="closeMap">Close</button>
  </div>
</div>

<div class="modal" id="statsModal">
  <div class="card">
    <h3>CHARACTER SHEET // MICHAEL COSTEA</h3>
    <p>Class: Field Systems Strategist · Spec: Growth + Ops + Electrical Trade</p>
    <div id="statsBars"></div>
    <ul id="skillList"></ul>
    <button class="btn" id="closeStats">Close</button>
  </div>
</div>

<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const mini=document.getElementById('mini'),mctx=mini.getContext('2d');
const FX_QUALITY='ultra';
let vw=0,vh=0,dpr=1;
function resize(){dpr=Math.max(1,Math.min(3,devicePixelRatio||1));vw=innerWidth;vh=innerHeight;cv.width=Math.round(vw*dpr);cv.height=Math.round(vh*dpr);cv.style.width=vw+'px';cv.style.height=vh+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.imageSmoothingEnabled=false;} addEventListener('resize',resize); resize();

const world={w:1800,h:2400};
const ROAD_X=640, ROAD_W=520;
const player={x:420,y:760,s:2.55};
const cam={x:0,y:0};
let time=0;
const nodes=[
  {id:'N1',x:260,y:680,title:'Bloom Coffee Bar',desc:'Startup operations and service flow.'},
  {id:'N2',x:340,y:980,title:'Optus Retention',desc:'Retention process redesign.'},
  {id:'N3',x:260,y:1320,title:'Process Specialist',desc:'Cross-team communications and rollout.'},
  {id:'N4',x:1520,y:740,title:'Content Manager',desc:'Knowledge system leadership.'},
  {id:'N5',x:1460,y:1110,title:'Sales Ops Manager',desc:'KPI and support redesign.'},
  {id:'N6',x:1460,y:1460,title:'Electrician Roles',desc:'Field execution and smart-home delivery.'},
  {id:'N7',x:340,y:1710,title:'Sales Manager',desc:'Program-driven upgrade operations.'},
  {id:'N8',x:900,y:2100,title:'BD & Marketing Manager',desc:'Growth, partnerships, CX innovation.'}
];
const npcs=[
  {x:430,y:620,c:'#ffcf99',name:'Mia',role:'planner',vx:0.45,vy:0,minX:250,maxX:520,minY:590,maxY:720,phrase:'Checking route'},
  {x:480,y:640,c:'#ffd7a8',name:'Noah',role:'driver',vx:-0.4,vy:0,minX:250,maxX:520,minY:590,maxY:720,phrase:'On my way'},
  {x:1360,y:640,c:'#ffc6a1',name:'Ari',role:'ops',vx:0,vy:0.35,minX:1290,maxX:1560,minY:620,maxY:900,phrase:'Ops synced'},
  {x:1420,y:760,c:'#ffdab8',name:'Liv',role:'sales',vx:0,vy:-0.4,minX:1290,maxX:1560,minY:620,maxY:900,phrase:'Lead warm'},
  {x:1500,y:920,c:'#f6c6a3',name:'Kai',role:'field',vx:0.35,vy:0,minX:1280,maxX:1660,minY:880,maxY:1120,phrase:'Site ready'},
  {x:360,y:1540,c:'#ffd4ad',name:'Jules',role:'support',vx:0.42,vy:0,minX:230,maxX:520,minY:1480,maxY:1780,phrase:'Tickets clear'},
  {x:1330,y:1680,c:'#f1c5a3',name:'Rin',role:'partner',vx:-0.38,vy:0,minX:1210,maxX:1600,minY:1580,maxY:1880,phrase:'Pilot live'}
];
const traffic=[
  {x:ROAD_X+110,y:860,c:'#2f6ec7',speed:0.42,lane:'down'},
  {x:ROAD_X+300,y:1060,c:'#d48d3a',speed:0.5,lane:'down'},
  {x:ROAD_X+120,y:1520,c:'#d6bf2d',speed:0.44,lane:'down'},
  {x:ROAD_X+304,y:520,c:'#aeb7c3',speed:0.52,lane:'up'},
  {x:ROAD_X+112,y:1760,c:'#9b7cff',speed:0.46,lane:'up'}
];
const viewed=new Set(JSON.parse(localStorage.getItem('dnt_v68_viewed')||'[]'));
let npcChatPairs=[];

function save(){localStorage.setItem('dnt_v68_viewed',JSON.stringify([...viewed]));}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1200);}

const joy=document.getElementById('joy'),stick=document.getElementById('stick');
let joyState={active:false,x:0,y:0,sx:0,sy:0};
function setStick(){const r=38;stick.style.left=(50+joyState.x*r)+'%';stick.style.top=(50+joyState.y*r)+'%';}
joy.addEventListener('pointerdown',e=>{joy.setPointerCapture(e.pointerId);joyState.active=true;joyState.sx=e.clientX;joyState.sy=e.clientY;});
joy.addEventListener('pointermove',e=>{if(!joyState.active) return;const dx=(e.clientX-joyState.sx)/46,dy=(e.clientY-joyState.sy)/46;const m=Math.hypot(dx,dy)||1;joyState.x=Math.max(-1,Math.min(1,dx/(m>1?m:1)));joyState.y=Math.max(-1,Math.min(1,dy/(m>1?m:1)));setStick();});
['pointerup','pointercancel','pointerleave'].forEach(ev=>joy.addEventListener(ev,()=>{joyState.active=false;joyState.x=0;joyState.y=0;setStick();}));
setStick();

const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;}); addEventListener('keyup',e=>{keys[e.key]=false;});

function drawPixelGuy(x,y){
  // shadow
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(x-12,y+22,24,4);
  // legs
  ctx.fillStyle='#12306f'; ctx.fillRect(x-10,y+10,8,12); ctx.fillRect(x+2,y+10,8,12);
  ctx.fillStyle='#0d1b34'; ctx.fillRect(x-10,y+20,8,3); ctx.fillRect(x+2,y+20,8,3);
  // torso/jacket
  ctx.fillStyle='#1a2233'; ctx.fillRect(x-12,y-6,24,18);
  ctx.fillStyle='#f2f5fb'; ctx.fillRect(x-4,y-3,8,13);
  ctx.fillStyle='#f0a436'; ctx.fillRect(x-3,y+1,6,3);
  // arms
  ctx.fillStyle='#1a2233'; ctx.fillRect(x-14,y-4,3,12); ctx.fillRect(x+11,y-4,3,12);
  // head
  ctx.fillStyle='#efc9a8'; ctx.fillRect(x-8,y-18,16,12);
  // cap + brim
  ctx.fillStyle='#2b67da'; ctx.fillRect(x-9,y-21,18,4);
  ctx.fillStyle='#1a448f'; ctx.fillRect(x-4,y-17,10,2);
  // face dots
  ctx.fillStyle='#1b2f57'; ctx.fillRect(x-4,y-13,2,1); ctx.fillRect(x+2,y-13,2,1);
}

function drawNPCGuy(x,y,shirt='#2f6ec7',skin='#f1c5a3'){
  // same detail class as player, slightly smaller
  ctx.fillStyle='rgba(0,0,0,.24)'; ctx.fillRect(x-10,y+18,20,3);
  ctx.fillStyle='#263041'; ctx.fillRect(x-8,y+6,7,11); ctx.fillRect(x+1,y+6,7,11);
  ctx.fillStyle='#1b2435'; ctx.fillRect(x-9,y-5,18,16);
  ctx.fillStyle=shirt; ctx.fillRect(x-4,y-2,8,9);
  ctx.fillStyle=skin; ctx.fillRect(x-6,y-15,12,10);
  ctx.fillStyle='#2d3545'; ctx.fillRect(x-10,y-2,2,9); ctx.fillRect(x+8,y-2,2,9);
  ctx.fillStyle='#151b28'; ctx.fillRect(x-8,y+16,7,2); ctx.fillRect(x+1,y+16,7,2);
  ctx.fillStyle='#111c33'; ctx.fillRect(x-3,y-11,2,1); ctx.fillRect(x+1,y-11,2,1);
}

function drawHeroBlock(x,y,theme='warm'){
  const wall = theme==='warm' ? '#a2644d' : '#5f7797';
  const trim = theme==='warm' ? '#d3b08c' : '#a0b8d8';
  const dark = theme==='warm' ? '#8f5342' : '#3d516f';
  const glass = theme==='warm' ? '#d9c0a6' : '#9ab9df';

  ctx.fillStyle=wall; ctx.fillRect(x,y,460,300);
  ctx.fillStyle=trim; ctx.fillRect(x+20,y+20,420,90);
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.fillRect(x,y+300,460,10);

  // roof machines / vents
  for(let i=0;i<7;i++){
    const rx=x+30+i*58;
    ctx.fillStyle=dark; ctx.fillRect(rx,y-22,36,14);
    ctx.fillStyle=trim; ctx.fillRect(rx+4,y-18,28,4);
  }

  // facade rhythm
  for(let yy=y+128;yy<y+286;yy+=24){
    for(let xx=x+16;xx<x+440;xx+=34){
      ctx.fillStyle=dark; ctx.fillRect(xx,yy,22,2);
    }
  }

  // windows
  for(let yy=y+136;yy<y+276;yy+=42){
    for(let xx=x+32;xx<x+428;xx+=54){
      ctx.fillStyle=dark; ctx.fillRect(xx,yy,26,44);
      ctx.fillStyle=glass; ctx.fillRect(xx+4,yy+4,18,18);
      ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(xx+4,yy+4,8,2);
    }
  }

  // balcony strips / trims
  for(let yy=y+192;yy<y+290;yy+=18){
    ctx.fillStyle='rgba(22,34,50,.22)'; ctx.fillRect(x+20,yy,420,2);
  }
}

function drawWorld(){
  // sky haze for cinematic depth
  const sky=ctx.createLinearGradient(0,0,0,620);
  sky.addColorStop(0,'#9ec3f5');
  sky.addColorStop(1,'#d9f0ff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,world.w,620);

  // lush top trees
  ctx.fillStyle='#3b8e4f'; ctx.fillRect(0,0,world.w,560);
  for(let i=0;i<380;i++){
    const x=(i*73)%world.w,y=(i*41)%560;
    ctx.fillStyle=['#2f7d44','#41985a','#2b6f3d','#56aa6a'][i%4];
    ctx.fillRect(x,y,20,16);
    if(i%2===0){ctx.fillStyle='rgba(210,250,190,.2)';ctx.fillRect(x+3,y+3,6,2);} 
  }

  // tiled city floor
  ctx.fillStyle='#ddd8cd'; ctx.fillRect(0,560,world.w,world.h-560);
  for(let y=560;y<world.h;y+=18){for(let x=0;x<world.w;x+=18){ctx.fillStyle=((x+y)%36===0)?'#d1cbbd':'#ddd8cd';ctx.fillRect(x,y,16,16); if(((x*y)%97)===0){ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(x+6,y+6,3,2);} }}
  // subtle grime gradient on lower city
  const grime=ctx.createLinearGradient(0,1200,0,world.h);
  grime.addColorStop(0,'rgba(0,0,0,0)'); grime.addColorStop(1,'rgba(0,0,0,.12)');
  ctx.fillStyle=grime; ctx.fillRect(0,1200,world.w,world.h-1200);

  // central road 1:1 style
  ctx.fillStyle='#343840'; ctx.fillRect(ROAD_X,120,ROAD_W,world.h-120);
  ctx.fillStyle='#292d34'; ctx.fillRect(ROAD_X+10,120,ROAD_W-20,world.h-120);
  // edge AO + depth
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.fillRect(ROAD_X,120,10,world.h-120); ctx.fillRect(ROAD_X+ROAD_W-10,120,10,world.h-120);
  ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(ROAD_X+14,120,4,world.h-120); ctx.fillRect(ROAD_X+ROAD_W-18,120,4,world.h-120);
  for(let y=180;y<world.h-60;y+=92){ctx.fillStyle='#f5f5f5';ctx.fillRect(ROAD_X+ROAD_W/2-6,y,12,46);} 

  // two zebra crossings + contact shadows
  for(let i=0;i<12;i++){
    ctx.fillStyle='#f8f8f8';
    ctx.fillRect(ROAD_X+70+i*32,720,18,90);
    ctx.fillRect(ROAD_X+70+i*32,1360,18,90);
    ctx.fillStyle='rgba(0,0,0,.08)';
    ctx.fillRect(ROAD_X+70+i*32,810,18,3);
    ctx.fillRect(ROAD_X+70+i*32,1450,18,3);
  }

  // hero art blocks (1:1 quality template)
  drawHeroBlock(100,620,'warm');
  drawHeroBlock(1240,620,'cool');

  // lower district blocks for added depth and continuity
  drawHeroBlock(100,1120,'warm');
  drawHeroBlock(1240,1120,'cool');
  // benches + flower beds
  for(let i=0;i<8;i++){ctx.fillStyle='#7f552f';ctx.fillRect(150,700+i*120,28,56);ctx.fillStyle='#cda679';ctx.fillRect(154,706+i*120,20,40);} 
  for(let i=0;i<26;i++){const fx=1210+(i*29)%520, fy=980+((i*67)%540);ctx.fillStyle=['#ffd66d','#ffffff','#ff8aa5','#a6e874'][i%4];ctx.fillRect(fx,fy,3,3);} 
  // sidewalk decals / urban detail
  for(let i=0;i<40;i++){
    const dx=80+((i*83)%1640), dy=620+((i*61)%1660);
    ctx.fillStyle=i%3===0?'rgba(0,0,0,.10)':'rgba(255,255,255,.08)';
    ctx.fillRect(dx,dy,6,2);
  }
  // rail tracks bottom zone
  ctx.fillStyle='#4f6278'; ctx.fillRect(100,1850,1600,24); ctx.fillRect(100,1930,1600,24);
  for(let x=110;x<1690;x+=30){ctx.fillStyle='#94a7bf';ctx.fillRect(x,1850,4,24);ctx.fillRect(x,1930,4,24);} 
  ctx.fillStyle='rgba(0,0,0,.16)'; ctx.fillRect(100,1874,1600,8); ctx.fillRect(100,1954,1600,8);

  // moving traffic
  traffic.forEach(c=>{
    ctx.fillStyle='#1f2736';ctx.fillRect(c.x-2,c.y-2,96,152);
    ctx.fillStyle=c.c;ctx.fillRect(c.x,c.y,92,148);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(c.x+10,c.y+10,72,20);
    ctx.fillStyle='#1d2431';ctx.fillRect(c.x+18,c.y+126,56,14);
    ctx.fillStyle='#0d1119';ctx.fillRect(c.x+8,c.y+140,16,6);ctx.fillRect(c.x+68,c.y+140,16,6);
  });

  // chapter nodes
  nodes.forEach(n=>{
    const seen=viewed.has(n.id);
    ctx.fillStyle=seen?'#8bff9e':'#ffdf6f'; ctx.fillRect(n.x-8,n.y-22,16,16);
    ctx.fillStyle='#1f2e4b'; ctx.fillRect(n.x-2,n.y-6,4,9);
  });

  // NPC crowd (same detail class as player) + active interactions
  npcs.forEach((p,i)=>{
    const shirt=['#2f6ec7','#ffb347','#9b7cff','#f76c6c','#3abf8f'][i%5];
    drawNPCGuy(p.x,p.y,shirt,p.c);
  });

  // talk bubbles between close NPCs
  npcChatPairs.forEach(({a,b,msg})=>{
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2-34;
    ctx.fillStyle='#f8fbff'; ctx.fillRect(mx-34,my-16,68,16);
    ctx.strokeStyle='#1c2f47'; ctx.lineWidth=1; ctx.strokeRect(mx-34,my-16,68,16);
    ctx.fillStyle='#0f1b2d'; ctx.font='bold 8px monospace';
    ctx.fillText(msg,mx-30,my-5);
  });

  // extra dense pedestrians for depth
  for(let i=0;i<20;i++){
    const px = (i%2===0? 300 : 1460) + ((i*37 + time*0.35)%120);
    const py = 820 + i*72 + Math.sin((time+i*7)*0.04)*3;
    const shirt=['#5ea0ff','#ffc167','#a18aff','#f78a8a','#6fd9a4'][i%5];
    const skin=['#f1c5a3','#ffd7b4','#eab89c','#f4cfb0'][i%4];
    drawNPCGuy(px,py,shirt,skin);
  }
}

function update(){
  time += 1;

  // animate city traffic
  traffic.forEach(c=>{
    if(c.lane==='down') c.y += c.speed;
    else c.y -= c.speed;
    if(c.y>world.h-80) c.y = 170;
    if(c.y<140) c.y = world.h-110;
  });

  // wandering NPCs in local districts
  npcs.forEach((n,i)=>{
    n.x += n.vx; n.y += n.vy;
    if(n.x<n.minX || n.x>n.maxX) n.vx *= -1;
    if(n.y<n.minY || n.y>n.maxY) n.vy *= -1;
    if(i%2===0){ n.x += Math.sin((time+i*13)*0.03)*0.12; }
  });

  // detect NPC interactions
  npcChatPairs=[];
  for(let i=0;i<npcs.length;i++){
    for(let j=i+1;j<npcs.length;j++){
      const a=npcs[i], b=npcs[j];
      if(Math.hypot(a.x-b.x,a.y-b.y)<54){
        npcChatPairs.push({a,b,msg:(time%120<60? a.phrase : b.phrase)});
      }
    }
  }

  let ix=(keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0);
  let iy=(keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0);
  if(Math.abs(joyState.x)>0.06||Math.abs(joyState.y)>0.06){ix=joyState.x;iy=joyState.y;}
  const m=Math.hypot(ix,iy)||1; ix/=m; iy/=m;
  player.x=Math.max(40,Math.min(world.w-40,player.x+ix*player.s));
  player.y=Math.max(120,Math.min(world.h-40,player.y+iy*player.s));

  nodes.forEach(n=>{
    if(Math.hypot(player.x-n.x,player.y-n.y)<34){
      if(!viewed.has(n.id)){viewed.add(n.id);save();toast('Unlocked: '+n.title);} 
    }
  });

  cam.x=Math.max(0,Math.min(world.w-vw,player.x-vw*0.5));
  cam.y=Math.max(0,Math.min(world.h-vh,player.y-vh*0.56));
}

function drawMini(){
  mctx.clearRect(0,0,110,110);
  mctx.fillStyle='#95bf8f';mctx.fillRect(0,0,110,110);
  const sx=110/world.w, sy=110/world.h;
  mctx.fillStyle='#ddd8cd';mctx.fillRect(0,560*sy,110,110-(560*sy));
  mctx.fillStyle='#343840';mctx.fillRect(ROAD_X*sx,120*sy,ROAD_W*sx,(world.h-120)*sy);
  mctx.fillStyle='#4f6278';mctx.fillRect(100*sx,1850*sy,1600*sx,24*sy);mctx.fillRect(100*sx,1930*sy,1600*sx,24*sy);
  nodes.forEach(n=>{mctx.fillStyle=viewed.has(n.id)?'#62d979':'#ffb84a';mctx.fillRect(n.x*sx-1,n.y*sy-1,3,3);});
  mctx.fillStyle='#d93030';mctx.fillRect(player.x*sx-2,player.y*sy-2,4,4);
}

function render(){
  ctx.clearRect(0,0,vw,vh);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  drawWorld();
  drawPixelGuy(player.x,player.y);
  // foreground canopy band for layered depth
  ctx.fillStyle='rgba(18,56,31,.18)';
  for(let i=0;i<80;i++){const x=(i*43+time*0.15)%world.w;ctx.fillRect(x,540,28,14);} 
  // moving soft tree-shadows across city floor
  ctx.fillStyle='rgba(10,35,14,.08)';
  for(let i=0;i<24;i++){
    const sx=(i*91 + time*0.45)%world.w;
    const sy=620 + (i*67)%1500;
    ctx.fillRect(sx,sy,56,12);
  }
  ctx.restore();

  // cinematic vignette + color depth
  const g=ctx.createRadialGradient(vw/2,vh/2,80,vw/2,vh/2,Math.max(vw,vh)*0.95);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.24)');
  ctx.fillStyle=g; ctx.fillRect(0,0,vw,vh);
  const grade=ctx.createLinearGradient(0,0,0,vh);
  grade.addColorStop(0,'rgba(140,175,255,.10)'); grade.addColorStop(1,'rgba(12,18,30,.12)');
  ctx.fillStyle=grade; ctx.fillRect(0,0,vw,vh);

  if(FX_QUALITY==='ultra'){
    // subtle scanline + bloom-like pass
    ctx.fillStyle='rgba(8,12,20,.04)';
    for(let y=0;y<vh;y+=3) ctx.fillRect(0,y,vw,1);
    ctx.globalCompositeOperation='screen';
    ctx.globalAlpha=0.06;
    ctx.drawImage(cv,1,0,vw-1,vh,0,0,vw,vh);
    ctx.drawImage(cv,0,1,vw,vh-1,0,0,vw,vh);
    ctx.globalAlpha=1;
    ctx.globalCompositeOperation='source-over';
  }

  drawMini();
  requestAnimationFrame(loop);
}
function loop(){update();render();}
loop();

const menuModal=document.getElementById('menuModal'),mapModal=document.getElementById('mapModal'),statsModal=document.getElementById('statsModal');
document.getElementById('menuBtn').onclick=()=>menuModal.classList.add('open');
document.getElementById('mapBtn').onclick=()=>{const list=document.getElementById('mapList');list.innerHTML=nodes.map(n=>`<li>${viewed.has(n.id)?'✅':'⬜'} <b>${n.id}</b> — ${n.title}</li>`).join('');mapModal.classList.add('open');};
document.getElementById('openStatsFromMenu').onclick=()=>{menuModal.classList.remove('open');statsModal.classList.add('open');};
document.getElementById('closeMenu').onclick=()=>menuModal.classList.remove('open');
document.getElementById('closeMap').onclick=()=>mapModal.classList.remove('open');
document.getElementById('closeStats').onclick=()=>statsModal.classList.remove('open');
menuModal.onclick=e=>{if(e.target===menuModal)menuModal.classList.remove('open')};
mapModal.onclick=e=>{if(e.target===mapModal)mapModal.classList.remove('open')};
statsModal.onclick=e=>{if(e.target===statsModal)statsModal.classList.remove('open')};
document.getElementById('backSite').onclick=()=>location.href='../index.html';
document.getElementById('jumpNext').onclick=()=>{const n=nodes.find(n=>!viewed.has(n.id))||nodes[nodes.length-1];player.x=n.x;player.y=n.y+24;menuModal.classList.remove('open');};
