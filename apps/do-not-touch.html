<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>DO NOT TOUCH — v68 Pixel City Story Mode</title>
<style>
:root{--bg:#d8efe7;--ink:#0f1b2d;--line:#1c2f47;--panel:#eef5ff}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,Segoe UI,Arial,sans-serif}
#game{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;background:#9ecf86}
.ui{position:fixed;inset:0;pointer-events:none}
.topbar{position:fixed;left:10px;right:10px;top:calc(env(safe-area-inset-top,0px)+8px);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;z-index:8;pointer-events:none}
.brand{background:transparent;color:#fff;padding:2px 2px;font-weight:900;letter-spacing:.03em;text-shadow:2px 2px 0 #000, -1px -1px 0 rgba(0,0,0,.35);line-height:.9;font-size:1.9rem}
.top-actions{display:flex;gap:8px;pointer-events:auto}
.btn{border:3px solid #1e2e48;background:#f7faff;color:#111;padding:8px 16px;border-radius:0;font-weight:900;font-size:1.05rem;box-shadow:4px 4px 0 rgba(30,46,72,.55),inset 0 1px 0 #fff;font-family:monospace}
.btn:active{transform:translateY(1px)}
.logo-badge{position:fixed;left:10px;top:calc(env(safe-area-inset-top,0px)+8px);width:86px;height:86px;border-radius:999px;background:radial-gradient(circle at 35% 30%,#ffffff 0,#d7dff0 48%,#8b99b5 100%);border:4px solid #f8fbff;box-shadow:0 0 0 3px #2b3f63, 2px 2px 0 rgba(0,0,0,.35);z-index:9;display:grid;place-items:center;color:#243a5a;font-weight:900;font-size:.8rem;letter-spacing:.03em;line-height:.9;text-align:center}
.joystick{position:fixed;right:12px;bottom:calc(env(safe-area-inset-bottom,0px)+16px);width:132px;height:132px;border-radius:999px;background:rgba(20,26,40,.66);border:5px solid #0d121b;z-index:8;pointer-events:auto;touch-action:none;box-shadow:inset 0 0 0 3px #4c5667}
.stick{position:absolute;left:50%;top:50%;width:58px;height:58px;margin-left:-29px;margin-top:-29px;border-radius:999px;background:#c62f2f;border:4px solid #3c0f0f;box-shadow:0 0 0 2px rgba(255,255,255,.28) inset}
.minimap{position:fixed;left:12px;bottom:calc(env(safe-area-inset-bottom,0px)+16px);width:112px;height:112px;border-radius:6px;background:#d8e1ef;border:4px solid #273b5e;z-index:8;overflow:hidden;pointer-events:none;box-shadow:3px 3px 0 rgba(0,0,0,.4)}
.minimap canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.modal{position:fixed;inset:0;display:none;place-items:center;padding:14px;background:rgba(2,8,20,.7);z-index:20}
.modal.open{display:grid}
.card{width:min(760px,96vw);max-height:82vh;overflow:auto;background:#0f1b34;color:#e7f0ff;border:2px solid #5a79ac;border-radius:12px;padding:14px}
.card h3{margin:.2rem 0 .4rem}
.card ul{margin:.2rem 0 .6rem;padding-left:18px}
.stat-row{display:grid;grid-template-columns:150px 1fr 44px;gap:8px;align-items:center;margin:6px 0;font-size:.86rem}
.stat-meter{height:10px;border:1px solid #6587be;border-radius:999px;overflow:hidden;background:#132544}
.stat-meter>span{display:block;height:100%;background:linear-gradient(90deg,#71d8ff,#94ffaf)}
.toast{position:fixed;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top,0px)+62px);z-index:30;background:rgba(8,14,28,.92);color:#e5eeff;border:1px solid #5a78ad;border-radius:999px;padding:8px 12px;font-size:.8rem;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
@media (max-width:820px){
  .brand{display:none}
  .btn{padding:7px 12px;font-size:.86rem}
  .logo-badge{width:72px;height:72px;font-size:.66rem}
  .joystick{width:120px;height:120px}
  .stick{width:52px;height:52px;margin-left:-26px;margin-top:-26px}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui">
  <div class="logo-badge">MICHAEL<br/>COSTEA</div>
  <div class="topbar">
    <div class="brand"></div>
    <div class="top-actions">
      <button class="btn" id="mapBtn">MAP</button>
      <button class="btn" id="menuBtn">MENU</button>
    </div>
  </div>
  <div class="minimap"><canvas id="mini" width="110" height="110"></canvas></div>
  <div class="joystick" id="joy"><div class="stick" id="stick"></div></div>
  <div class="toast" id="toast"></div>
</div>

<div class="modal" id="menuModal">
  <div class="card">
    <h3>DO NOT TOUCH // MENU</h3>
    <p>Presentation-safe build: top-down movement, no forced interrupts, no death/fall states.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" id="jumpNext">Jump to Next Chapter</button>
      <button class="btn" id="openStatsFromMenu">Character Stats</button>
      <button class="btn" id="backSite">Back to MichaelOS</button>
      <button class="btn" id="closeMenu">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="mapModal">
  <div class="card">
    <h3>City Map / Chapter Progress</h3>
    <ul id="mapList"></ul>
    <button class="btn" id="closeMap">Close</button>
  </div>
</div>

<div class="modal" id="statsModal">
  <div class="card">
    <h3>CHARACTER SHEET // MICHAEL COSTEA</h3>
    <p>Class: Field Systems Strategist · Spec: Growth + Ops + Electrical Trade</p>
    <div id="statsBars"></div>
    <ul id="skillList"></ul>
    <button class="btn" id="closeStats">Close</button>
  </div>
</div>

<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const mini=document.getElementById('mini'),mctx=mini.getContext('2d');
let vw=0,vh=0,dpr=1;
function resize(){dpr=Math.max(1,Math.min(3,devicePixelRatio||1));vw=innerWidth;vh=innerHeight;cv.width=Math.round(vw*dpr);cv.height=Math.round(vh*dpr);cv.style.width=vw+'px';cv.style.height=vh+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.imageSmoothingEnabled=false;} addEventListener('resize',resize); resize();

const world={w:2200,h:1600};
const player={x:220,y:540,s:2.35};
const cam={x:0,y:0};
const nodes=[
  {id:'N1',x:300,y:580,title:'Bloom Coffee Bar',desc:'Startup operations and service flow.'},
  {id:'N2',x:540,y:680,title:'Optus Retention',desc:'Retention process redesign.'},
  {id:'N3',x:690,y:820,title:'Process Specialist',desc:'Cross-team communications and rollout.'},
  {id:'N4',x:1480,y:680,title:'Content Manager',desc:'Knowledge system leadership.'},
  {id:'N5',x:1610,y:840,title:'Sales Ops Manager',desc:'KPI and support redesign.'},
  {id:'N6',x:520,y:1060,title:'Electrician Roles',desc:'Field execution and smart-home delivery.'},
  {id:'N7',x:1520,y:1080,title:'Sales Manager',desc:'Program-driven upgrade operations.'},
  {id:'N8',x:980,y:1360,title:'BD & Marketing Manager',desc:'Growth, partnerships, CX innovation.'}
];
const npcs=[
  {x:420,y:430,c:'#ffcf99'},{x:470,y:430,c:'#ffd7a8'},{x:1250,y:440,c:'#ffc6a1'},{x:1320,y:560,c:'#ffdab8'},{x:1780,y:530,c:'#f6c6a3'}
];
const viewed=new Set(JSON.parse(localStorage.getItem('dnt_v67_viewed')||'[]'));

function save(){localStorage.setItem('dnt_v67_viewed',JSON.stringify([...viewed]));}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1200);}

const joy=document.getElementById('joy'),stick=document.getElementById('stick');
let joyState={active:false,x:0,y:0,sx:0,sy:0};
function setStick(){const r=38;stick.style.left=(50+joyState.x*r)+'%';stick.style.top=(50+joyState.y*r)+'%';}
joy.addEventListener('pointerdown',e=>{joy.setPointerCapture(e.pointerId);joyState.active=true;joyState.sx=e.clientX;joyState.sy=e.clientY;});
joy.addEventListener('pointermove',e=>{if(!joyState.active) return;const dx=(e.clientX-joyState.sx)/46,dy=(e.clientY-joyState.sy)/46;const m=Math.hypot(dx,dy)||1;joyState.x=Math.max(-1,Math.min(1,dx/(m>1?m:1)));joyState.y=Math.max(-1,Math.min(1,dy/(m>1?m:1)));setStick();});
['pointerup','pointercancel','pointerleave'].forEach(ev=>joy.addEventListener(ev,()=>{joyState.active=false;joyState.x=0;joyState.y=0;setStick();}));
setStick();

const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;}); addEventListener('keyup',e=>{keys[e.key]=false;});

function drawPixelGuy(x,y){
  // shadow
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(x-12,y+22,24,4);
  // legs
  ctx.fillStyle='#12306f'; ctx.fillRect(x-10,y+10,8,12); ctx.fillRect(x+2,y+10,8,12);
  ctx.fillStyle='#0d1b34'; ctx.fillRect(x-10,y+20,8,3); ctx.fillRect(x+2,y+20,8,3);
  // torso/jacket
  ctx.fillStyle='#1a2233'; ctx.fillRect(x-12,y-6,24,18);
  ctx.fillStyle='#f2f5fb'; ctx.fillRect(x-4,y-3,8,13);
  ctx.fillStyle='#f0a436'; ctx.fillRect(x-3,y+1,6,3);
  // arms
  ctx.fillStyle='#1a2233'; ctx.fillRect(x-14,y-4,3,12); ctx.fillRect(x+11,y-4,3,12);
  // head
  ctx.fillStyle='#efc9a8'; ctx.fillRect(x-8,y-18,16,12);
  // cap + brim
  ctx.fillStyle='#2b67da'; ctx.fillRect(x-9,y-21,18,4);
  ctx.fillStyle='#1a448f'; ctx.fillRect(x-4,y-17,10,2);
  // face dots
  ctx.fillStyle='#1b2f57'; ctx.fillRect(x-4,y-13,2,1); ctx.fillRect(x+2,y-13,2,1);
}

function drawWorld(){
  // forest canopy background
  ctx.fillStyle='#2f7d44'; ctx.fillRect(0,0,world.w,430);
  for(let i=0;i<220;i++){const x=(i*97)%world.w,y=(i*53)%420;ctx.fillStyle=['#2f7d44','#3a9352','#2a6f3d','#46a25f'][i%4];ctx.fillRect(x,y,22,18);if(i%3===0){ctx.fillStyle='rgba(190,240,170,.22)';ctx.fillRect(x+4,y+3,6,3);}} 

  // sidewalks and city blocks
  ctx.fillStyle='#d9d5cb'; ctx.fillRect(0,430,world.w,world.h-430);
  for(let y=430;y<world.h;y+=20){for(let x=0;x<world.w;x+=20){ctx.fillStyle=((x+y)%40===0)?'#cec8bb':'#d9d5cb';ctx.fillRect(x,y,18,18);}}

  // main road (vertical, reference style)
  const roadX=840, roadW=520;
  ctx.fillStyle='#353843'; ctx.fillRect(roadX,120,roadW,world.h-120);
  ctx.fillStyle='#2a2d36'; ctx.fillRect(roadX+10,120,roadW-20,world.h-120);
  for(let y=160;y<world.h-40;y+=86){ctx.fillStyle='#f2f2f2';ctx.fillRect(roadX+roadW/2-5,y,10,42);} 

  // crosswalks
  for(let i=0;i<12;i++){ctx.fillStyle='#f5f5f5';ctx.fillRect(roadX+70+i*32,520,18,78);ctx.fillRect(roadX+70+i*32,980,18,78);} 

  // rails near bottom like reference
  ctx.fillStyle='#4f6278'; ctx.fillRect(140,1220,1920,22); ctx.fillRect(140,1280,1920,22);
  for(let x=150;x<2040;x+=28){ctx.fillStyle='#94a7bf';ctx.fillRect(x,1220,4,22);ctx.fillRect(x,1280,4,22);} 

  // buildings/props left and right
  ctx.fillStyle='#9a5d46'; ctx.fillRect(120,470,520,260); ctx.fillStyle='#caa883'; ctx.fillRect(140,490,480,70);
  for(let y=500;y<720;y+=24){for(let x=130;x<620;x+=36){ctx.fillStyle='#8a4f3d';ctx.fillRect(x,y,24,2);}}
  ctx.fillStyle='#5a708f'; ctx.fillRect(1500,470,560,240); ctx.fillStyle='#9ab0cf'; ctx.fillRect(1520,490,520,70);
  for(let x=1540;x<2030;x+=48){ctx.fillStyle='#3b4f6b';ctx.fillRect(x,560,28,42);ctx.fillStyle='#94b3da';ctx.fillRect(x+4,564,20,16);} 
  for(let i=0;i<6;i++){ctx.fillStyle='#7f552f';ctx.fillRect(190,520+i*84,26,56);ctx.fillStyle='#cda679';ctx.fillRect(194,526+i*84,18,40);} // benches
  for(let i=0;i<18;i++){const fx=1420+(i*37)%620, fy=760+((i*71)%360);ctx.fillStyle=['#ffd66d','#ffffff','#ff8aa5','#a6e874'][i%4];ctx.fillRect(fx,fy,3,3);}

  // cars (readable obstacles style)
  const cars=[
    {x:roadX+110,y:650,c:'#2f6ec7'},{x:roadX+302,y:860,c:'#d48d3a'},{x:roadX+120,y:1110,c:'#d6bf2d'},{x:roadX+304,y:430,c:'#aeb7c3'}
  ];
  cars.forEach(c=>{
    ctx.fillStyle='#1f2736';ctx.fillRect(c.x-2,c.y-2,96,150);
    ctx.fillStyle=c.c;ctx.fillRect(c.x,c.y,92,146);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(c.x+10,c.y+10,72,20);
    ctx.fillStyle='#1d2431';ctx.fillRect(c.x+18,c.y+126,56,12);
    ctx.fillStyle='#0d1119';ctx.fillRect(c.x+8,c.y+138,16,6);ctx.fillRect(c.x+68,c.y+138,16,6);
  });

  // chapter nodes (on safe sidewalk lane)
  nodes.forEach(n=>{
    const seen=viewed.has(n.id);
    ctx.fillStyle=seen?'#8bff9e':'#ffdf6f'; ctx.fillRect(n.x-7,n.y-20,14,14);
    ctx.fillStyle='#1f2e4b'; ctx.fillRect(n.x-2,n.y-6,4,8);
  });

  // npcs
  npcs.forEach((p,i)=>{
    const shirt=['#2f6ec7','#ffb347','#9b7cff','#f76c6c','#3abf8f'][i%5];
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(p.x-7,p.y+13,14,3);
    ctx.fillStyle=p.c;ctx.fillRect(p.x-6,p.y-12,12,10);
    ctx.fillStyle='#2b2f3f';ctx.fillRect(p.x-7,p.y-2,14,14);
    ctx.fillStyle=shirt;ctx.fillRect(p.x-5,p.y,10,8);
    ctx.fillStyle='#123';ctx.fillRect(p.x-6,p.y+10,5,3);ctx.fillRect(p.x+1,p.y+10,5,3);
  });
}

function update(){
  let ix=(keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0);
  let iy=(keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0);
  if(Math.abs(joyState.x)>0.06||Math.abs(joyState.y)>0.06){ix=joyState.x;iy=joyState.y;}
  const m=Math.hypot(ix,iy)||1; ix/=m; iy/=m;
  player.x=Math.max(40,Math.min(world.w-40,player.x+ix*player.s));
  player.y=Math.max(120,Math.min(world.h-40,player.y+iy*player.s));

  nodes.forEach(n=>{
    if(Math.hypot(player.x-n.x,player.y-n.y)<34){
      if(!viewed.has(n.id)){viewed.add(n.id);save();toast('Unlocked: '+n.title);} 
    }
  });

  cam.x=Math.max(0,Math.min(world.w-vw,player.x-vw*0.5));
  cam.y=Math.max(0,Math.min(world.h-vh,player.y-vh*0.56));
}

function drawMini(){
  mctx.clearRect(0,0,110,110);
  mctx.fillStyle='#b7d0b1';mctx.fillRect(0,0,110,110);
  const sx=110/world.w, sy=110/world.h;
  mctx.fillStyle='#d5c9ad';mctx.fillRect(80*sx,350*sy,2060*sx,260*sy);
  mctx.fillStyle='#495b74';mctx.fillRect(80*sx,640*sy,2060*sx,20*sy);mctx.fillRect(80*sx,700*sy,2060*sx,20*sy);
  nodes.forEach(n=>{mctx.fillStyle=viewed.has(n.id)?'#62d979':'#ffb84a';mctx.fillRect(n.x*sx-1,n.y*sy-1,3,3);});
  mctx.fillStyle='#d93030';mctx.fillRect(player.x*sx-2,player.y*sy-2,4,4);
}

function render(){
  ctx.clearRect(0,0,vw,vh);
  ctx.save(); ctx.translate(-cam.x,-cam.y);
  drawWorld();
  drawPixelGuy(player.x,player.y);
  ctx.restore();
  drawMini();
  requestAnimationFrame(loop);
}
function loop(){update();render();}
loop();

const menuModal=document.getElementById('menuModal'),mapModal=document.getElementById('mapModal'),statsModal=document.getElementById('statsModal');
document.getElementById('menuBtn').onclick=()=>menuModal.classList.add('open');
document.getElementById('mapBtn').onclick=()=>{const list=document.getElementById('mapList');list.innerHTML=nodes.map(n=>`<li>${viewed.has(n.id)?'✅':'⬜'} <b>${n.id}</b> — ${n.title}</li>`).join('');mapModal.classList.add('open');};
document.getElementById('openStatsFromMenu').onclick=()=>{menuModal.classList.remove('open');statsModal.classList.add('open');};
document.getElementById('closeMenu').onclick=()=>menuModal.classList.remove('open');
document.getElementById('closeMap').onclick=()=>mapModal.classList.remove('open');
document.getElementById('closeStats').onclick=()=>statsModal.classList.remove('open');
menuModal.onclick=e=>{if(e.target===menuModal)menuModal.classList.remove('open')};
mapModal.onclick=e=>{if(e.target===mapModal)mapModal.classList.remove('open')};
statsModal.onclick=e=>{if(e.target===statsModal)statsModal.classList.remove('open')};
document.getElementById('backSite').onclick=()=>location.href='../index.html';
document.getElementById('jumpNext').onclick=()=>{const n=nodes.find(n=>!viewed.has(n.id))||nodes[nodes.length-1];player.x=n.x;player.y=n.y+24;menuModal.classList.remove('open');};

const stats=[['Leadership',95],['Electrical Tradecraft',92],['Sales Strategy',94],['Process Engineering',96],['Automation Systems',90],['Customer Experience',93],['Partnership Development',91],['Execution Speed',97]];
const skills=['VEU upgrade operations','Lead-gen optimization','Cross-brand growth orchestration','Field-to-digital systems translation','Training + process rollout','Electrical/smart-home delivery'];
document.getElementById('statsBars').innerHTML=stats.map(([k,v])=>`<div class='stat-row'><span>${k}</span><div class='stat-meter'><span style='width:${v}%'></span></div><b>${v}</b></div>`).join('');
document.getElementById('skillList').innerHTML=skills.map(s=>`<li>${s}</li>`).join('');
</script>
</body>
</html>
