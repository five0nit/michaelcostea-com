<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>DO NOT TOUCH // FUN MODE</title>
<style>
:root{--bg:#06070d;--fg:#e8f0ff;--muted:#9aaed0;--hot:#ff4db8;--cyan:#72e5ff;--lime:#9bff72}
*{box-sizing:border-box} html,body{margin:0;height:100dvh;overflow:hidden;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--fg)}
#fx{position:fixed;inset:0;width:100%;height:100dvh;z-index:0}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(180deg,rgba(255,255,255,.02) 0 1px,transparent 1px 3px)}
.ui{position:fixed;inset:0;z-index:3;padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:10px}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.brand{font-weight:900;letter-spacing:.14em;text-transform:uppercase}
.badge{font-size:.78rem;padding:6px 10px;border:1px solid #3f5e96;background:rgba(8,16,32,.6);border-radius:999px;color:#c9dbf6}
.play{display:grid;place-items:center;position:relative}
.target{position:absolute;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#041225;cursor:pointer;user-select:none;transition:transform .1s ease,filter .1s ease}
.target:active{transform:scale(.92)}
#t1{background:radial-gradient(circle at 30% 30%,#fff,#72e5ff 55%,#1f6fb2)}
#t2{background:radial-gradient(circle at 30% 30%,#fff,#ff7ad4 55%,#a9297a)}
#t3{background:radial-gradient(circle at 30% 30%,#fff,#adff7a 55%,#4f9c29)}
.centerText{text-align:center;pointer-events:none}
.centerText h1{margin:0;font-size:clamp(1.8rem,8vw,5rem);letter-spacing:.12em;text-transform:uppercase;text-shadow:0 0 34px rgba(114,229,255,.35)}
.centerText p{margin:8px 0 0;color:var(--muted)}
.bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.riddle{max-width:min(74vw,820px);font-size:.9rem;color:#cfe0ff;opacity:.95}
.small{font-size:.78rem;color:#a8bddf}
.flash{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;background:radial-gradient(circle at center,rgba(255,255,255,.25),transparent 55%)}
.flash.on{animation:f .22s ease}
@keyframes f{0%{opacity:.5}100%{opacity:0}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="scan"></div>
<div id="flash" class="flash"></div>

<div class="ui">
  <div class="top">
    <div class="brand">DO NOT TOUCH / FUN RUN</div>
    <div class="badge" id="score">SCORE 0</div>
    <div class="badge" id="combo">COMBO x1</div>
    <div class="badge" id="mode">MODE STREET</div>
  </div>

  <div class="play" id="play">
    <div class="centerText">
      <h1 id="title">HIT THE LIGHT</h1>
      <p id="sub">No tutorial. Just instinct.</p>
    </div>
    <div class="target" id="t1">+3</div>
    <div class="target" id="t2">+5</div>
    <div class="target" id="t3">+8</div>
  </div>

  <div class="bottom">
    <div class="riddle" id="riddle">“They sold you safety by making wonder look childish.”</div>
    <div class="small">Pro tip: press <b>R</b> to reshuffle mood, <b>G</b> for glitch burst.</div>
  </div>
</div>

<script>
const fx=document.getElementById('fx'),ctx=fx.getContext('2d');
const flash=document.getElementById('flash');
const scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),modeEl=document.getElementById('mode');
const titleEl=document.getElementById('title'),subEl=document.getElementById('sub'),riddleEl=document.getElementById('riddle');
const targets=[...document.querySelectorAll('.target')];
const play=document.getElementById('play');
let w=0,h=0,cx=0,cy=0,t=0,last=performance.now(),score=0,combo=1,mode='STREET',glitch=0;
const points=[3,5,8];
const riddles=[
  'They sold you safety by making wonder look childish.',
  'If reality is a script, rebellion is improvisation.',
  'You don\'t find meaning. You forge it under pressure.',
  'Most cages are made of habits, not steel.',
  'The loudest room is usually full of borrowed thoughts.'
];
const stars=[...Array(650)].map(()=>({a:Math.random()*Math.PI*2,r:20+Math.random()*1200,s:.2+Math.random()*2.1,z:Math.random()}));

function resize(){const vv=window.visualViewport; w=fx.width=Math.round(vv?.width||innerWidth); h=fx.height=Math.round(vv?.height||innerHeight); cx=w/2; cy=h/2;}
addEventListener('resize',resize); if(window.visualViewport) window.visualViewport.addEventListener('resize',resize); resize();

function placeTargets(){
  const pad=80;
  targets.forEach(t=>{ t.style.left=(pad+Math.random()*(w-pad*2)-37)+'px'; t.style.top=(pad+Math.random()*(h-pad*2)-37)+'px'; });
}
placeTargets(); setInterval(placeTargets, 1700);

function hit(i){
  score += points[i]*combo;
  combo = Math.min(9, combo+1);
  scoreEl.textContent=`SCORE ${score}`;
  comboEl.textContent=`COMBO x${combo}`;
  flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
  if(score>250) { titleEl.textContent='RABBIT STATE'; subEl.textContent='You found the rhythm.'; mode='FEVER'; modeEl.textContent='MODE FEVER'; }
  if(Math.random()<0.35) riddleEl.textContent=riddles[(Math.random()*riddles.length)|0];
}

targets.forEach((el,i)=>el.addEventListener('click',()=>hit(i)));
play.addEventListener('click',e=>{ if(e.target.classList.contains('target')) return; combo=1; comboEl.textContent='COMBO x1'; });

addEventListener('keydown',e=>{
  if(e.key.toLowerCase()==='r'){ mode = mode==='STREET'?'RABBIT':'STREET'; modeEl.textContent='MODE '+mode; riddleEl.textContent=riddles[(Math.random()*riddles.length)|0]; }
  if(e.key.toLowerCase()==='g'){ glitch=1.0; }
});

function draw(now){
  const dt=Math.min(.05,(now-last)/1000); last=now; t+=dt*60;
  glitch=Math.max(0,glitch-0.03);
  const chaos = 0.45 + 0.35*Math.sin(t*0.7) + glitch*0.6;

  ctx.fillStyle='rgba(4,7,14,0.20)'; ctx.fillRect(0,0,w,h);
  const g=ctx.createRadialGradient(cx,cy,30,cx,cy,Math.max(w,h)*.66);
  g.addColorStop(0,`rgba(${24+chaos*120},${35+chaos*80},${88+chaos*130},0.24)`);
  g.addColorStop(1,'rgba(3,5,11,0.10)');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

  for(const s of stars){
    s.a += 0.0015+s.s*0.0018*(1+chaos*2.4);
    const rr=s.r*(0.66+0.34*Math.sin(t*(1+s.z*.35)+s.z*9));
    const x=cx+Math.cos(s.a+t*(0.24+chaos*1.2))*rr;
    const y=cy+Math.sin(s.a+t*(0.24+chaos*1.2))*rr;
    const sz=0.7+s.s*(1+chaos*2.2);
    const hue=(mode==='RABBIT'?300:200)+120*Math.sin(s.a*2+t);
    ctx.fillStyle=`hsla(${hue%360},100%,${58+18*Math.sin(t+s.z*8)}%,${0.12+0.55*chaos})`;
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
  }

  for(let i=0;i<18;i++){
    const r=(i*38 + (t*(210+chaos*140))%38)*(1+chaos*0.35);
    ctx.strokeStyle=`hsla(${(190+i*8+t*20)%360},100%,65%,${0.025+chaos*0.06})`;
    ctx.lineWidth=1+chaos*1.3;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }

  if(Math.random()<0.006+glitch*0.06){
    ctx.fillStyle=`hsla(${(t*280)%360},100%,70%,0.18)`;
    ctx.fillRect(0,Math.random()*h,w,2+Math.random()*10);
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
