<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Otis & His Friends 3D</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#071018;font-family:Verdana,Arial,sans-serif}
    #c{display:block;width:100%;height:100%}
    .hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:3;pointer-events:none}
    .pill{background:rgba(8,18,30,.72);border:1px solid #4a6c8a;color:#eaf4ff;padding:6px 10px;border-radius:999px;font-size:12px}
    .controls{position:fixed;bottom:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:3}
    .btns{display:flex;gap:8px}
    button{background:rgba(24,42,60,.86);color:#fff;border:1px solid #6f90a8;border-radius:10px;padding:10px 12px;font-weight:700}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(4,10,16,.82);z-index:6;padding:16px}
    .overlay .card{max-width:560px;width:100%;background:rgba(8,18,30,.95);border:1px solid #4a6c8a;border-radius:12px;padding:14px;color:#eaf4ff}
    .overlay .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .hidden{display:none!important}
    .touchHud{position:fixed;left:12px;bottom:84px;z-index:5;display:none}
    .joyWrap{width:128px;height:128px;border-radius:50%;background:rgba(8,18,30,.6);border:2px solid #466787;position:relative;touch-action:none}
    .joyKnob{position:absolute;width:44px;height:44px;border-radius:50%;left:42px;top:42px;background:#b9d8f3;border:2px solid #45637d}
    .filmGrain{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:.09;background-image:radial-gradient(rgba(255,255,255,.35) 0.6px, transparent 0.7px);background-size:3px 3px;mix-blend-mode:soft-light;animation:grainShift .25s steps(2) infinite}
    .filmGrain.off{display:none}
    @keyframes grainShift{0%{transform:translate(0,0)}25%{transform:translate(1px,-1px)}50%{transform:translate(-1px,1px)}75%{transform:translate(1px,1px)}100%{transform:translate(0,0)}}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud">

        <button id="chooseJoystick">Joystick</button>
        <button id="chooseTilt">Accelerometer</button>
      </div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.164.1';
import { GLTFLoader } from 'https://esm.sh/three@0.164.1/examples/jsm/loaders/GLTFLoader.js';
import { EffectComposer } from 'https://esm.sh/three@0.164.1/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://esm.sh/three@0.164.1/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://esm.sh/three@0.164.1/examples/jsm/postprocessing/UnrealBloomPass.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1620);
scene.fog = new THREE.Fog(0x0a1620, 20, 80);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 8, 10);

const hemi = new THREE.HemisphereLight(0xb7ddff, 0x1f2d19, 0.75); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.15); sun.position.set(12,22,9); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); scene.add(sun);
const rim = new THREE.DirectionalLight(0xaad7ff, 0.6); rim.position.set(-14,10,-12); scene.add(rim);
const fill = new THREE.PointLight(0xfff3dc, 0.28, 38); fill.position.set(0,6,8); scene.add(fill);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.28, 0.32, 0.88);
composer.addPass(bloomPass);
let fxEnabled = true;

const TILE=1.6, W=64, H=46;
const map = Array.from({length:H}, ()=>Array(W).fill(0)); // 0 grass 1 tree 2 water 3 gap 4 cliff
for(let y=0;y<H;y++) for(let x=0;x<W;x++) if(!x||!y||x===W-1||y===H-1) map[y][x]=1;
const set=(x1,y1,x2,y2,t)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++) map[y][x]=t;};

// Long multi-zone maze with forced transformation gates
set(14,1,14,32,1); set(30,1,30,32,1);
set(14,15,14,18,2);   // fish gate
set(30,10,30,13,4);   // goat gate
set(40,22,43,22,3);   // bird gap gate

// Dense blockers (maze complexity)
set(2,24,13,32,1); set(16,2,29,7,1); set(16,23,29,32,1);
set(32,2,46,16,1); set(32,27,46,32,1);
set(4,5,12,5,1); set(4,10,12,10,1); set(4,15,12,15,1); set(4,20,12,20,1);
set(18,12,28,12,1); set(18,18,28,18,1);
set(34,20,39,20,1); set(34,24,39,24,1);

// Carve winding corridors
set(2,2,13,23,0); set(16,14,29,22,0); set(32,9,39,26,0); set(44,20,46,25,0);
set(6,6,10,9,0); set(6,11,10,14,0); set(6,16,10,19,0);
set(20,14,23,17,0); set(24,19,28,22,0);
set(34,11,37,14,0); set(34,21,37,23,0);

// Water / cliff regions + decoy biomes
set(6,16,11,19,2); set(20,15,25,18,2); set(34,11,37,13,4); set(44,21,46,24,3);
set(8,7,9,8,2); set(22,20,23,21,4); set(36,22,37,23,2);

// expand map footprint and force longer traversal lanes
set(47,1,W-2,H-2,1);
set(2,34,46,H-2,1);
set(8,30,40,30,2);     // extra fish requirement lane
set(20,26,22,26,3);    // extra bird jump in late path
set(31,23,31,25,4);    // extra goat climb gate

const tileMeshes=[];

function makeTileTexture(base='#4b9650', speck='#3a7d42', lines='#2f6636'){
  const c=document.createElement('canvas'); c.width=128; c.height=128;
  const x=c.getContext('2d');
  x.fillStyle=base; x.fillRect(0,0,128,128);
  for(let i=0;i<420;i++){
    x.fillStyle = i%3===0 ? speck : lines;
    const px=(Math.random()*128)|0, py=(Math.random()*128)|0, s=1+((Math.random()*3)|0);
    x.fillRect(px,py,s,s);
  }
  const tex=new THREE.CanvasTexture(c);
  tex.colorSpace=THREE.SRGBColorSpace;
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(1,1);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy?.() || 8;
  return tex;
}

const texTree  = makeTileTexture('#2c5f2c','#3e7a3d','#244e24');
const texWater = makeTileTexture('#2a79bf','#4aa0de','#22639d');
const texGap   = makeTileTexture('#111922','#1c2835','#0d1219');
const texCliff = makeTileTexture('#a38663','#b59875','#7c664a');

  tree:new THREE.MeshStandardMaterial({map:texTree, color:0xffffff, roughness:0.95}),

const gTile = new THREE.BoxGeometry(TILE, 0.35, TILE);
const gTall = new THREE.BoxGeometry(TILE, 1.8, TILE);
for(let y=0;y<H;y++) for(let x=0;x<W;x++){
  const t=map[y][x];
  let geo=gTile, mat=mats.grass, yPos=0;
  if(t===1){ geo=gTall; mat=mats.tree; yPos=0.7; }
  if(t===2){ geo=gTile; mat=mats.water; yPos=-0.08; }
  if(t===3){ geo=gTile; mat=mats.gap; yPos=-0.32; }
  if(t===4){ geo=gTile; mat=mats.cliff; yPos=0.28; }
  const m=new THREE.Mesh(geo,mat); m.receiveShadow=true; m.castShadow=t===1;
  m.position.set((x-W/2)*TILE,yPos,(y-H/2)*TILE);
  scene.add(m); tileMeshes.push(m);

  // ground decal ring for richer high-quality terrain breakup
  if(t===0 && (x*7+y*11)%9===0){
    const ring = new THREE.Mesh(new THREE.RingGeometry(0.18,0.26,16), new THREE.MeshStandardMaterial({color:0x3f7f47, roughness:0.95, side:THREE.DoubleSide}));
    ring.rotation.x = -Math.PI/2;
    ring.position.set((x-W/2)*TILE + (((x+y)%3)-1)*0.12, 0.182, (y-H/2)*TILE + (((x*2+y)%3)-1)*0.1);
    scene.add(ring);
  }
}

// Biome/environment quality pass: props + micro detail
const env = new THREE.Group(); scene.add(env);
const tuftMat = new THREE.MeshStandardMaterial({color:0x3d7f45, roughness:0.92});
const reedMat = new THREE.MeshStandardMaterial({color:0x9cd79f, roughness:0.85});
const rockMat = new THREE.MeshStandardMaterial({color:0x9ea5ab, roughness:0.88});
const crystalMat = new THREE.MeshPhysicalMaterial({color:0x8fd3ff, roughness:0.2, transmission:0.2, clearcoat:0.4});
for(let y=1;y<H-1;y++) for(let x=1;x<W-1;x++){
  const t=map[y][x];
  const px=(x-W/2)*TILE, pz=(y-H/2)*TILE;
  if(t===0 && (x*13+y*7)%11===0){
    const tuft=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.24,6), tuftMat);
    tuft.position.set(px + (((x*3)%5)-2)*0.09, 0.18, pz + (((y*7)%5)-2)*0.09);
    env.add(tuft);
  }
  if(t===2 && (x+y)%4===0){
    const reed=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.018,0.3,6), reedMat);
    reed.position.set(px+0.22,0.08,pz-0.18); env.add(reed);
  }
  if(t===4 && (x*5+y*3)%5===0){
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(0.12,0), rockMat);
    rock.position.set(px-0.18,0.44,pz+0.1); env.add(rock);
  }
  if(t===3 && (x+y)%6===0){
    const crystal=new THREE.Mesh(new THREE.OctahedronGeometry(0.11,0), crystalMat);
    crystal.position.set(px,0.02,pz); env.add(crystal);
  }
}

const hero = new THREE.Group(); scene.add(hero);
const avatarRoot = new THREE.Group(); hero.add(avatarRoot);

animalRoot.add(birdModel,fishModel,goatModel);
birdModel.visible=false; fishModel.visible=false; goatModel.visible=false;

// Free online GLB asset upgrade (Khronos sample models)
const gltfLoader = new GLTFLoader();
function fitGLB(targetGroup, gltfScene, {scale=1, rotY=0}={}){
  targetGroup.clear();
  const root = gltfScene;
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x,size.y,size.z) || 1;
  const s = scale / maxDim;
  root.scale.setScalar(s);
  const box2 = new THREE.Box3().setFromObject(root);
  const center = box2.getCenter(new THREE.Vector3());
  root.position.sub(center);
  root.position.y += 0.25;
  root.rotation.y = rotY;
  root.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; } });
  targetGroup.add(root);
}
function replaceWithGLBFallback(targetGroup, urls, opts={}){
  const tryLoad = (idx)=>{
    if(idx>=urls.length) return;
    gltfLoader.load(urls[idx], (gltf)=>fitGLB(targetGroup, gltf.scene, opts), undefined, ()=>tryLoad(idx+1));
  };
  tryLoad(0);
}

const envAssetGroup = new THREE.Group(); scene.add(envAssetGroup);
function addEnvAsset(url, gx, gy, y=0.25, scale=0.8, rotY=0){
  gltfLoader.load(url, (gltf)=>{
    const root=gltf.scene;
    const box=new THREE.Box3().setFromObject(root);
    const size=box.getSize(new THREE.Vector3());
    const maxDim=Math.max(size.x,size.y,size.z)||1;
    root.scale.setScalar(scale/maxDim);
    const center=new THREE.Box3().setFromObject(root).getCenter(new THREE.Vector3());
    root.position.sub(center);
    root.position.set((gx-W/2)*TILE, y, (gy-H/2)*TILE);
    root.rotation.y = rotY;
    root.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; }});
    envAssetGroup.add(root);
  });
}

function onTilt(e){
  tiltState.gamma = e.gamma || 0; // left/right
  tiltState.beta = e.beta || 0;   // front/back
}
async function enableTilt(){
  try{
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') return false;
    }
    addEventListener('deviceorientation', onTilt, {passive:true});
    tiltState.enabled=true;
    document.getElementById('tilt').textContent='Tilt: On';
    return true;
  } catch { return false; }
}
function disableTilt(){
  removeEventListener('deviceorientation', onTilt);
  tiltState.enabled=false;
  document.getElementById('tilt').textContent='Tilt: Off';
}
document.getElementById('tilt').onclick=async()=>{
  if(tiltState.enabled) disableTilt();
  else {
    const ok = await enableTilt();
    if(!ok) alert('Tilt permission not granted or unsupported on this browser.');
    else controlMode='accelerometer';
  }
};

const touchHud=document.getElementById('touchHud');
const joyWrap=document.getElementById('joyWrap');
const joyKnob=document.getElementById('joyKnob');
function resetJoy(){ joyState.active=false; joyState.x=0; joyState.y=0; joyKnob.style.left='42px'; joyKnob.style.top='42px'; }
function setJoyByPointer(e){
  const r=joyWrap.getBoundingClientRect();
  const nx=(e.clientX-(r.left+r.width/2))/((r.width/2)-20);
  const ny=(e.clientY-(r.top+r.height/2))/((r.height/2)-20);
  const mag=Math.hypot(nx,ny)||1;
  const c=Math.min(1,mag);
  joyState.x=(nx/mag)*c; joyState.y=(ny/mag)*c; joyState.active=true;
  joyKnob.style.left=`${42+joyState.x*28}px`; joyKnob.style.top=`${42+joyState.y*28}px`;
}
if(joyWrap){
  joyWrap.addEventListener('pointerdown',(e)=>{joyWrap.setPointerCapture(e.pointerId); setJoyByPointer(e);});
  joyWrap.addEventListener('pointermove',(e)=>{if(joyState.active) setJoyByPointer(e);});
  ['pointerup','pointercancel','lostpointercapture'].forEach(evt=>joyWrap.addEventListener(evt,resetJoy));
}

async function startWithMode(mode){
  controlMode=mode;
  if(mode==='accelerometer'){
    const ok=await enableTilt();
    if(!ok){ controlMode='joystick'; }
  } else {
    disableTilt();
  }
  touchHud.style.display = (controlMode==='joystick') ? 'block' : 'none';
  document.getElementById('controlOverlay').classList.add('hidden');
  hp=100; hpPill.textContent='HP: 100';
  initLevel(1);
  playing=true;
}

document.getElementById('chooseJoystick').onclick=()=>startWithMode('joystick');
document.getElementById('chooseTilt').onclick=()=>startWithMode('accelerometer');

document.getElementById('fxBtn').onclick=()=>{
  fxEnabled = !fxEnabled;
  document.getElementById('fxBtn').textContent = fxEnabled ? 'FX: On' : 'FX: Off';
  document.getElementById('filmGrain').classList.toggle('off', !fxEnabled);
};

const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();

  if(playing){
    let ix=0, iy=0;

    if(keys.ArrowUp||keys.w) iy -= 1;
    if(keys.ArrowDown||keys.s) iy += 1;
    if(keys.ArrowLeft||keys.a) ix -= 1;
    if(keys.ArrowRight||keys.d) ix += 1;

    if(controlMode==='joystick' && joyState.active){
      ix = joyState.x;
      iy = joyState.y;
    } else if(controlMode==='accelerometer' && tiltState.enabled){
      const g=tiltState.gamma, b=tiltState.beta;
      ix = THREE.MathUtils.clamp(g/24, -1, 1);
      iy = THREE.MathUtils.clamp(b/24, -1, 1);
    }

    // deadzone + normalize for smooth analog movement
    const mag=Math.hypot(ix,iy);
    if(mag<0.12){ ix=0; iy=0; }
    else { ix/=mag; iy/=mag; }

    const maxSpeed = 4.2; // tiles/sec
    const accel = 11.0;
    const damping = 9.5;

    const tx = ix*maxSpeed, ty = iy*maxSpeed;
    const lerpA = Math.min(1, dt*accel);
    heroVel.x += (tx-heroVel.x)*lerpA;
    heroVel.y += (ty-heroVel.y)*lerpA;

    if(ix===0) heroVel.x *= Math.max(0,1-dt*damping);
    if(iy===0) heroVel.y *= Math.max(0,1-dt*damping);

    const nx = heroPos.x + heroVel.x*dt;
    const ny = heroPos.y + heroVel.y*dt;

    // axis-separated collision so movement feels smooth, not strobe/blocky
    if(canStep(Math.round(nx), Math.round(heroPos.y))) heroPos.x = nx; else heroVel.x = 0;
    if(canStep(Math.round(heroPos.x), Math.round(ny))) heroPos.y = ny; else heroVel.y = 0;

    heroPos.x = THREE.MathUtils.clamp(heroPos.x, 1, W-2);
    heroPos.y = THREE.MathUtils.clamp(heroPos.y, 1, H-2);
    heroGrid.x = Math.round(heroPos.x);
    heroGrid.y = Math.round(heroPos.y);
  }

  place();

  const t = clock.elapsedTime;
  const speed = Math.hypot(heroVel.x, heroVel.y);
  const walkAmp = Math.min(0.3, speed*0.075);

  // face walking direction (smooth yaw)
  if(speed > 0.03){
    const targetYaw = Math.atan2(heroVel.x, heroVel.y);
    let delta = targetYaw - hero.rotation.y;
    while(delta > Math.PI) delta -= Math.PI*2;
    while(delta < -Math.PI) delta += Math.PI*2;
    hero.rotation.y += delta * Math.min(1, dt*12);
  }

  // player walk animation (smooth, speed-driven)
  if(form==='otis'){
    const moving = speed > 0.06;
    const cycle = moving ? (14 + speed*2.6) : 2;
    const stride = Math.sin(t*cycle);
    const amp = moving ? Math.max(0.24, walkAmp*2.2) : 0.02;
    otisRig.armL.rotation.x = stride*amp*0.95;
    otisRig.armR.rotation.x = -stride*amp*0.95;
    otisRig.legL.rotation.x = -stride*amp*2.6;
    otisRig.legR.rotation.x = stride*amp*2.6;
    otisRig.shoeL.rotation.x = -stride*amp*1.5;
    otisRig.shoeR.rotation.x = stride*amp*1.5;
    otisRig.body.position.y = 0.56 + Math.sin(t*cycle*2)*amp*0.09;
  }

  // subtle high-detail form animation
  if(form==='bird'){
    birdModel.rotation.y = Math.sin(t*(4+speed))*0.12;
    birdModel.position.y = Math.sin(t*(6+speed))*0.04;
  } else if(form==='fish'){
    fishModel.rotation.y = Math.sin(t*(5+speed))*0.14;
    fishModel.position.x = Math.sin(t*(7+speed))*0.03;
  } else if(form==='goat'){
    goatModel.rotation.y = Math.sin(t*(3+speed))*0.08;
    goatModel.position.y = Math.abs(Math.sin(t*(6+speed)))*0.03;
  }

  // decoy enemy contact damage
  const now=clock.elapsedTime;
  decoys.forEach((d,i)=>{
    const m=decoyMeshes[i];
    if(!m) return;
    const hit = Math.abs(heroGrid.x-d.x)+Math.abs(heroGrid.y-d.y) <= 1;
    if(hit && (now-(m.userData.hitAt||0))>0.8){
      m.userData.hitAt=now;
      hp=Math.max(0,hp-8);
      hpPill.textContent=`HP: ${hp}`;
      stateEl.textContent='Form: '+form[0].toUpperCase()+form.slice(1)+' · Ouch! Decoy hit';
      setTimeout(()=>{ if(playing) stateEl.textContent='Form: '+form[0].toUpperCase()+form.slice(1); },500);
      if(hp<=0){
        hp=100; hpPill.textContent='HP: 100';
        stateEl.textContent='You fainted. Restarting level...';
        setTimeout(()=>{ initLevel(currentLevel); stateEl.textContent='Form: '+form[0].toUpperCase()+form.slice(1); }, 700);
      }
    }
  });

  // friend idle animation from sketch silhouettes
  friendModels.forEach((fm,i)=>{
    if(!fm.visible) return;
    fm.position.y = 0.8 + Math.sin(t*(2.4+i*0.25) + i)*0.05;
    const r = fm.userData || {};
    if(r.armL) r.armL.rotation.z = 0.12 + Math.sin(t*(2.0+i*0.2))*0.2;
    if(r.armR) r.armR.rotation.z = -0.12 - Math.sin(t*(2.0+i*0.2))*0.2;
    if(r.legL) r.legL.rotation.x = Math.sin(t*(3.6+i*0.3))*0.12;
    if(r.legR) r.legR.rotation.x = -Math.sin(t*(3.6+i*0.3))*0.12;
  });

  // follow cam (closer framing)
  camera.position.x += (hero.position.x - camera.position.x)*Math.min(1,dt*4.5);
  camera.position.y += (6.8 - camera.position.y)*Math.min(1,dt*3.2);
  camera.position.z += (hero.position.z + 10.5 - camera.position.z)*Math.min(1,dt*4.5);
  camera.lookAt(hero.position.x,1.2,hero.position.z);

  if(fxEnabled) composer.render();
  else renderer.render(scene,camera);
});

function onResize(){
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  composer.setSize(innerWidth,innerHeight);
  bloomPass.setSize(innerWidth,innerHeight);
}
addEventListener('resize', onResize);
</script>
