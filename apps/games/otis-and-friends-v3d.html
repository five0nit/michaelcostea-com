<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Otis & His Friends 3D</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#071018;font-family:Verdana,Arial,sans-serif}
    #c{display:block;width:100%;height:100%}
    .hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:3;pointer-events:none}
    .pill{background:rgba(8,18,30,.72);border:1px solid #4a6c8a;color:#eaf4ff;padding:6px 10px;border-radius:999px;font-size:12px}
    .controls{position:fixed;bottom:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:3}
    .btns{display:flex;gap:8px}
    button{background:rgba(24,42,60,.86);color:#fff;border:1px solid #6f90a8;border-radius:10px;padding:10px 12px;font-weight:700}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(4,10,16,.82);z-index:6;padding:16px}
    .overlay .card{max-width:560px;width:100%;background:rgba(8,18,30,.95);border:1px solid #4a6c8a;border-radius:12px;padding:14px;color:#eaf4ff}
    .overlay .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .hidden{display:none!important}
    .touchHud{position:fixed;left:12px;bottom:84px;z-index:5;display:none}
    .joyWrap{width:128px;height:128px;border-radius:50%;background:rgba(8,18,30,.6);border:2px solid #466787;position:relative;touch-action:none}
    .joyKnob{position:absolute;width:44px;height:44px;border-radius:50%;left:42px;top:42px;background:#b9d8f3;border:2px solid #45637d}
    .builder{position:fixed;top:54px;right:10px;z-index:4;background:rgba(8,18,30,.86);border:1px solid #4a6c8a;color:#eaf4ff;border-radius:10px;padding:8px;min-width:210px}
    .builder h4{margin:0 0 6px;font-size:12px;letter-spacing:.04em}
    .builder label,.builder select{font-size:12px;display:block;margin:4px 0}
    .builder .row{display:flex;gap:6px;flex-wrap:wrap}
    .builder .mini{padding:6px 8px;font-size:11px}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud">
    <div class="pill" id="state">Form: Otis</div>
    <div class="pill" id="found">Friends: 0 / 2</div>
    <div class="pill">3D Mode</div>
  </div>
  <div class="controls">
    <div class="btns">
      <button id="f1">Otis</button><button id="f2">Bird</button><button id="f3">Fish</button><button id="f4">Goat</button>
    </div>
    <div class="btns"><button id="search">Search</button><button id="tilt">Tilt: Off</button></div>
  </div>

  <div class="touchHud" id="touchHud"><div class="joyWrap" id="joyWrap"><div class="joyKnob" id="joyKnob"></div></div></div>

  <div class="overlay" id="controlOverlay">
    <div class="card">
      <h3 style="margin:0 0 6px">Choose Mobile Control Style</h3>
      <div style="font-size:13px;opacity:.9">Pick how Otis moves before starting. You can switch later.</div>
      <div class="row">
        <button id="chooseJoystick">Joystick</button>
        <button id="chooseTilt">Accelerometer</button>
      </div>
    </div>
  </div>

  <div class="builder">
    <h4>CHARACTER BUILDER</h4>
    <label>Base model
      <select id="modelPick">
        <option value="astronaut">Astronaut</option>
        <option value="robot">Robot</option>
        <option value="cesium">Cesium Man</option>
      </select>
    </label>
    <label><input type="checkbox" id="accGlasses" /> Funny glasses</label>
    <label><input type="checkbox" id="accPropeller" /> Propeller cap</label>
    <label><input type="checkbox" id="accNose" /> Clown nose</label>
    <label><input type="checkbox" id="accDuck" /> Rubber duck buddy</label>
    <div class="row"><button class="mini" id="applyBuild">Apply</button><button class="mini" id="randomBuild">Random</button></div>
  </div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.164.1';
import { GLTFLoader } from 'https://esm.sh/three@0.164.1/examples/jsm/loaders/GLTFLoader.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1620);
scene.fog = new THREE.Fog(0x0a1620, 20, 80);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 14, 18);

const hemi = new THREE.HemisphereLight(0x9ed0ff, 0x223319, 0.65); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.9); sun.position.set(12,22,9); sun.castShadow=true; scene.add(sun);

const TILE=1.6, W=48, H=34;
const map = Array.from({length:H}, ()=>Array(W).fill(0)); // 0 grass 1 tree 2 water 3 gap 4 cliff
for(let y=0;y<H;y++) for(let x=0;x<W;x++) if(!x||!y||x===W-1||y===H-1) map[y][x]=1;
const set=(x1,y1,x2,y2,t)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++) map[y][x]=t;};

// Long multi-zone maze with forced transformation gates
set(14,1,14,32,1); set(30,1,30,32,1);
set(14,15,14,18,2);   // fish gate
set(30,10,30,13,4);   // goat gate
set(40,22,43,22,3);   // bird gap gate

// Dense blockers (maze complexity)
set(2,24,13,32,1); set(16,2,29,7,1); set(16,23,29,32,1);
set(32,2,46,16,1); set(32,27,46,32,1);
set(4,5,12,5,1); set(4,10,12,10,1); set(4,15,12,15,1); set(4,20,12,20,1);
set(18,12,28,12,1); set(18,18,28,18,1);
set(34,20,39,20,1); set(34,24,39,24,1);

// Carve winding corridors
set(2,2,13,23,0); set(16,14,29,22,0); set(32,9,39,26,0); set(44,20,46,25,0);
set(6,6,10,9,0); set(6,11,10,14,0); set(6,16,10,19,0);
set(20,14,23,17,0); set(24,19,28,22,0);
set(34,11,37,14,0); set(34,21,37,23,0);

// Water / cliff regions + decoy biomes
set(6,16,11,19,2); set(20,15,25,18,2); set(34,11,37,13,4); set(44,21,46,24,3);
set(8,7,9,8,2); set(22,20,23,21,4); set(36,22,37,23,2);

const tileMeshes=[];
const mats={
  grass:new THREE.MeshStandardMaterial({color:0x4b9650, roughness:0.9}),
  tree:new THREE.MeshStandardMaterial({color:0x2c5f2c, roughness:0.95}),
  water:new THREE.MeshStandardMaterial({color:0x2a79bf, roughness:0.25, metalness:0.1}),
  gap:new THREE.MeshStandardMaterial({color:0x111922, roughness:1}),
  cliff:new THREE.MeshStandardMaterial({color:0xa38663, roughness:0.95})
};

const gTile = new THREE.BoxGeometry(TILE, 0.35, TILE);
const gTall = new THREE.BoxGeometry(TILE, 1.8, TILE);
for(let y=0;y<H;y++) for(let x=0;x<W;x++){
  const t=map[y][x];
  let geo=gTile, mat=mats.grass, yPos=0;
  if(t===1){ geo=gTall; mat=mats.tree; yPos=0.7; }
  if(t===2){ geo=gTile; mat=mats.water; yPos=-0.08; }
  if(t===3){ geo=gTile; mat=mats.gap; yPos=-0.32; }
  if(t===4){ geo=gTile; mat=mats.cliff; yPos=0.28; }
  const m=new THREE.Mesh(geo,mat); m.receiveShadow=true; m.castShadow=t===1;
  m.position.set((x-W/2)*TILE,yPos,(y-H/2)*TILE);
  scene.add(m); tileMeshes.push(m);
}

const hero = new THREE.Group(); scene.add(hero);
const avatarRoot = new THREE.Group(); hero.add(avatarRoot);
const animalRoot = new THREE.Group(); hero.add(animalRoot); animalRoot.visible=false;

// Fallback primitive (kept until GLB loads)
const fallbackBody = new THREE.Mesh(new THREE.BoxGeometry(1.0,1.3,0.8), new THREE.MeshStandardMaterial({color:0xc2616e, roughness:0.7}));
const fallbackHead = new THREE.Mesh(new THREE.BoxGeometry(0.82,0.82,0.82), new THREE.MeshStandardMaterial({color:0xf1d6b5, roughness:0.75})); fallbackHead.position.y=1.05;
const fallbackHat = new THREE.Mesh(new THREE.BoxGeometry(0.95,0.18,0.95), new THREE.MeshStandardMaterial({color:0xd94f63, roughness:0.6})); fallbackHat.position.y=1.55;
const fallbackPatch = new THREE.Mesh(new THREE.BoxGeometry(0.16,0.1,0.02), new THREE.MeshStandardMaterial({color:0x7a1f28, roughness:0.7})); fallbackPatch.position.set(0.14,1.1,0.42);
avatarRoot.add(fallbackBody,fallbackHead,fallbackHat,fallbackPatch);

// Signature details from initial Otis reference: cap swirl + eye patch
const otisSignature = new THREE.Group();
const sigPatch = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.09,0.02), new THREE.MeshStandardMaterial({color:0x7a1f28, roughness:0.65}));
sigPatch.position.set(0.14,1.1,0.42);
const sigBrim = new THREE.Mesh(new THREE.BoxGeometry(0.52,0.05,0.28), new THREE.MeshStandardMaterial({color:0xd94f63, roughness:0.6}));
sigBrim.position.set(0,1.47,0.25);
const sigSwirl = new THREE.Mesh(new THREE.TorusGeometry(0.06,0.01,8,18,Math.PI*1.5), new THREE.MeshStandardMaterial({color:0xf7cad0, roughness:0.45}));
sigSwirl.position.set(-0.06,1.56,0.42);
otisSignature.add(sigPatch,sigBrim,sigSwirl); avatarRoot.add(otisSignature);

// High-detail transformed animal meshes
const birdModel = new THREE.Group();
const birdBody = new THREE.Mesh(new THREE.SphereGeometry(0.46,24,18), new THREE.MeshStandardMaterial({color:0xd8b5ff, roughness:0.45, metalness:0.05}));
const birdWingL = new THREE.Mesh(new THREE.CapsuleGeometry(0.12,0.5,4,10), new THREE.MeshStandardMaterial({color:0xbe90f2, roughness:0.5})); birdWingL.position.set(-0.42,0.02,0);
const birdWingR = birdWingL.clone(); birdWingR.position.x=0.42;
const birdBeak = new THREE.Mesh(new THREE.ConeGeometry(0.11,0.35,10), new THREE.MeshStandardMaterial({color:0xffd66b, roughness:0.4})); birdBeak.rotation.x=Math.PI/2; birdBeak.position.set(0,0,0.48);
birdModel.add(birdBody,birdWingL,birdWingR,birdBeak);

const fishModel = new THREE.Group();
const fishBody = new THREE.Mesh(new THREE.SphereGeometry(0.42,26,16), new THREE.MeshStandardMaterial({color:0x6fc8ff, roughness:0.35, metalness:0.08})); fishBody.scale.set(1.45,0.8,0.9);
const fishTail = new THREE.Mesh(new THREE.ConeGeometry(0.18,0.4,10), new THREE.MeshStandardMaterial({color:0x48a7df, roughness:0.45})); fishTail.rotation.z=Math.PI/2; fishTail.position.set(-0.62,0,0);
const fishFin = new THREE.Mesh(new THREE.ConeGeometry(0.09,0.2,8), new THREE.MeshStandardMaterial({color:0x9de3ff, roughness:0.3})); fishFin.position.set(0.06,0.24,0.05);
fishModel.add(fishBody,fishTail,fishFin);

const goatModel = new THREE.Group();
const goatBody = new THREE.Mesh(new THREE.BoxGeometry(0.95,0.62,0.52), new THREE.MeshStandardMaterial({color:0xd6bf94, roughness:0.7}));
const goatHead = new THREE.Mesh(new THREE.BoxGeometry(0.42,0.34,0.34), new THREE.MeshStandardMaterial({color:0xe3cdab, roughness:0.66})); goatHead.position.set(0.52,0.2,0);
const goatHornL = new THREE.Mesh(new THREE.ConeGeometry(0.05,0.2,8), new THREE.MeshStandardMaterial({color:0x826b43, roughness:0.7})); goatHornL.position.set(0.64,0.43,0.11); goatHornL.rotation.z=-0.5;
const goatHornR = goatHornL.clone(); goatHornR.position.z=-0.11;
goatModel.add(goatBody,goatHead,goatHornL,goatHornR);

animalRoot.add(birdModel,fishModel,goatModel);
birdModel.visible=false; fishModel.visible=false; goatModel.visible=false;

const loader = new GLTFLoader();
const modelUrls={
  astronaut:'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  robot:'https://modelviewer.dev/shared-assets/models/RobotExpressive.glb',
  cesium:'https://modelviewer.dev/shared-assets/models/CesiumMan.glb'
};
let activeModel=null;
const accessories = new THREE.Group(); avatarRoot.add(accessories);

function clearAccessories(){
  while(accessories.children.length){
    const c=accessories.children.pop();
    if(c.geometry) c.geometry.dispose?.();
    if(c.material) c.material.dispose?.();
    accessories.remove(c);
  }
}
function addAccessoryGlasses(){
  const frame=new THREE.Mesh(new THREE.TorusGeometry(0.18,0.03,10,24), new THREE.MeshStandardMaterial({color:0x111111, roughness:0.4}));
  frame.position.set(-0.16,1.2,0.38);
  const frame2=frame.clone(); frame2.position.x=0.16;
  const bridge=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.03,0.03), new THREE.MeshStandardMaterial({color:0x111111})); bridge.position.set(0,1.2,0.38);
  accessories.add(frame,frame2,bridge);
}
function addAccessoryPropeller(){
  const cap=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,10), new THREE.MeshStandardMaterial({color:0xff6b7f, roughness:0.6})); cap.position.set(0,1.65,0);
  const stick=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.22), new THREE.MeshStandardMaterial({color:0xdddddd})); stick.position.set(0,1.83,0);
  const blade=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.02,0.08), new THREE.MeshStandardMaterial({color:0x7ad0ff})); blade.position.set(0,1.95,0);
  accessories.add(cap,stick,blade);
}
function addAccessoryNose(){
  const nose=new THREE.Mesh(new THREE.SphereGeometry(0.08,12,12), new THREE.MeshStandardMaterial({color:0xff2f3b, roughness:0.35})); nose.position.set(0,1.14,0.44); accessories.add(nose);
}
function addAccessoryDuck(){
  const duck=new THREE.Mesh(new THREE.SphereGeometry(0.13,12,10), new THREE.MeshStandardMaterial({color:0xffd34d, roughness:0.6})); duck.position.set(0.55,0.45,0.2);
  const beak=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.04,0.06), new THREE.MeshStandardMaterial({color:0xff8f36})); beak.position.set(0.63,0.44,0.2);
  accessories.add(duck,beak);
}

function applyAccessories(){
  clearAccessories();
  if(document.getElementById('accGlasses').checked) addAccessoryGlasses();
  if(document.getElementById('accPropeller').checked) addAccessoryPropeller();
  if(document.getElementById('accNose').checked) addAccessoryNose();
  if(document.getElementById('accDuck').checked) addAccessoryDuck();
}

function disposeObject3D(obj){
  obj.traverse((n)=>{ if(n.geometry) n.geometry.dispose?.(); if(n.material){ if(Array.isArray(n.material)) n.material.forEach(m=>m.dispose?.()); else n.material.dispose?.(); }});
}

function loadAvatarModel(kind='astronaut'){
  const url=modelUrls[kind]||modelUrls.astronaut;
  loader.load(url,(gltf)=>{
    if(activeModel){ avatarRoot.remove(activeModel); disposeObject3D(activeModel); activeModel=null; }
    activeModel=gltf.scene;
    activeModel.scale.setScalar(kind==='robot'?0.32:0.75);
    activeModel.position.set(0,0,0);
    activeModel.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; }});
    // remove fallback primitives when real asset is present
    fallbackBody.visible=false; fallbackHead.visible=false; fallbackHat.visible=false;
    avatarRoot.add(activeModel);
    applyAccessories();
  }, undefined, ()=>{
    // fallback stays visible on error
    fallbackBody.visible=true; fallbackHead.visible=true; fallbackHat.visible=true;
  });
}

const friendGeom = new THREE.SphereGeometry(0.45, 12, 10);
const milo = new THREE.Mesh(friendGeom, new THREE.MeshStandardMaterial({color:0xffc2ca, roughness:0.7}));
const poppy = new THREE.Mesh(friendGeom, new THREE.MeshStandardMaterial({color:0xff9fbc, roughness:0.7}));
const decoyGeom = new THREE.SphereGeometry(0.34, 10, 8);
const decoyMat = new THREE.MeshStandardMaterial({color:0xf6d36a, roughness:0.7, emissive:0x2a1f08, emissiveIntensity:0.25});
const decoyMeshes = [];
scene.add(milo,poppy);

const stateEl=document.getElementById('state'), foundEl=document.getElementById('found');
const forms=['otis','bird','fish','goat']; let form='otis';
let heroGrid={x:2,y:2};
let found={milo:false,poppy:false};
const miloPos={x:45,y:24}, poppyPos={x:11,y:18};
const decoys=[{x:9,y:8},{x:24,y:21},{x:36,y:22},{x:27,y:16},{x:42,y:24}];

function posFromGrid(g){ return new THREE.Vector3((g.x-W/2)*TILE,0.8,(g.y-H/2)*TILE); }
function place(){
  hero.position.copy(posFromGrid(heroGrid));
  milo.position.copy(posFromGrid(miloPos));
  poppy.position.copy(posFromGrid(poppyPos));
  decoyMeshes.forEach((m,i)=>{ const p=posFromGrid(decoys[i]); m.position.set(p.x,0.55,p.z); m.rotation.y += 0.01; });
}

for(const d of decoys){
  const m = new THREE.Mesh(decoyGeom, decoyMat.clone());
  const p=posFromGrid(d); m.position.set(p.x,0.55,p.z);
  scene.add(m); decoyMeshes.push(m);
}
place();

function setForm(f){
  form=f; stateEl.textContent='Form: '+f[0].toUpperCase()+f.slice(1);
  avatarRoot.visible = (f==='otis');
  animalRoot.visible = (f!=='otis');
  birdModel.visible = (f==='bird');
  fishModel.visible = (f==='fish');
  goatModel.visible = (f==='goat');

  // subtle form tint while keeping Otis reference details intact
  const tint = f==='otis'?0xffffff : f==='bird'?0xf2dcff : f==='fish'?0xd8f2ff : 0xfff0dc;
  avatarRoot.traverse(n=>{ if(n.isMesh && n.material && n.material.color){ const base=n.userData.baseColor || n.material.color.getHex(); n.userData.baseColor=base; n.material.color.setHex(base).multiply(new THREE.Color(tint)); }});
  otisSignature.visible = (f==='otis');
  fallbackHat.visible=f==='otis';
}
setForm('otis');
loadAvatarModel('astronaut');

function canStep(nx,ny){
  const t=map[ny]?.[nx]; if(t==null) return false;
  if(t===1) return false;
  if(t===2) return form==='fish';
  if(t===3) return form==='bird';
  if(t===4) return form==='goat';
  return true;
}

const keys={};
const tiltState={enabled:false,gamma:0,beta:0,lastMove:0};
const joyState={active:false,x:0,y:0};
let controlMode='joystick';
let playing=false;

addEventListener('keydown',e=>{keys[e.key]=true; if(e.key==='1')setForm('otis'); if(e.key==='2')setForm('bird'); if(e.key==='3')setForm('fish'); if(e.key==='4')setForm('goat'); if(e.key===' ')search();});
addEventListener('keyup',e=>{keys[e.key]=false;});

function move(dx,dy){ const nx=heroGrid.x+dx, ny=heroGrid.y+dy; if(canStep(nx,ny)){ heroGrid={x:nx,y:ny}; } }
function search(){
  const d1=Math.abs(heroGrid.x-miloPos.x)+Math.abs(heroGrid.y-miloPos.y);
  const d2=Math.abs(heroGrid.x-poppyPos.x)+Math.abs(heroGrid.y-poppyPos.y);
  if(d1<=1) found.milo=true;
  if(d2<=1) found.poppy=true;

  const decoyHit = decoys.findIndex(d=>Math.abs(heroGrid.x-d.x)+Math.abs(heroGrid.y-d.y)<=1);
  if(decoyHit>=0){
    const m=decoyMeshes[decoyHit];
    if(m){ m.material.emissiveIntensity = 1.2; setTimeout(()=>{ if(m.material) m.material.emissiveIntensity = 0.25; }, 300); }
    stateEl.textContent='Form: '+form[0].toUpperCase()+form.slice(1)+' · False clue!';
    setTimeout(()=>{stateEl.textContent='Form: '+form[0].toUpperCase()+form.slice(1);},700);
  }

  if(found.milo) milo.visible=false;
  if(found.poppy) poppy.visible=false;
  foundEl.textContent=`Friends: ${Number(found.milo)+Number(found.poppy)} / 2`;
}

['f1','f2','f3','f4'].forEach((id,i)=>document.getElementById(id).onclick=()=>setForm(forms[i]));
document.getElementById('search').onclick=search;
document.getElementById('applyBuild').onclick=()=>{ loadAvatarModel(document.getElementById('modelPick').value); applyAccessories(); };
document.getElementById('randomBuild').onclick=()=>{
  const models=['astronaut','robot','cesium'];
  document.getElementById('modelPick').value=models[Math.floor(Math.random()*models.length)];
  ['accGlasses','accPropeller','accNose','accDuck'].forEach(id=>{ document.getElementById(id).checked=Math.random()>0.5; });
  loadAvatarModel(document.getElementById('modelPick').value); applyAccessories();
};

function onTilt(e){
  tiltState.gamma = e.gamma || 0; // left/right
  tiltState.beta = e.beta || 0;   // front/back
}
async function enableTilt(){
  try{
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm !== 'granted') return false;
    }
    addEventListener('deviceorientation', onTilt, {passive:true});
    tiltState.enabled=true;
    document.getElementById('tilt').textContent='Tilt: On';
    return true;
  } catch { return false; }
}
function disableTilt(){
  removeEventListener('deviceorientation', onTilt);
  tiltState.enabled=false;
  document.getElementById('tilt').textContent='Tilt: Off';
}
document.getElementById('tilt').onclick=async()=>{
  if(tiltState.enabled) disableTilt();
  else {
    const ok = await enableTilt();
    if(!ok) alert('Tilt permission not granted or unsupported on this browser.');
    else controlMode='accelerometer';
  }
};

const touchHud=document.getElementById('touchHud');
const joyWrap=document.getElementById('joyWrap');
const joyKnob=document.getElementById('joyKnob');
function resetJoy(){ joyState.active=false; joyState.x=0; joyState.y=0; joyKnob.style.left='42px'; joyKnob.style.top='42px'; }
function setJoyByPointer(e){
  const r=joyWrap.getBoundingClientRect();
  const nx=(e.clientX-(r.left+r.width/2))/((r.width/2)-20);
  const ny=(e.clientY-(r.top+r.height/2))/((r.height/2)-20);
  const mag=Math.hypot(nx,ny)||1;
  const c=Math.min(1,mag);
  joyState.x=(nx/mag)*c; joyState.y=(ny/mag)*c; joyState.active=true;
  joyKnob.style.left=`${42+joyState.x*28}px`; joyKnob.style.top=`${42+joyState.y*28}px`;
}
if(joyWrap){
  joyWrap.addEventListener('pointerdown',(e)=>{joyWrap.setPointerCapture(e.pointerId); setJoyByPointer(e);});
  joyWrap.addEventListener('pointermove',(e)=>{if(joyState.active) setJoyByPointer(e);});
  ['pointerup','pointercancel','lostpointercapture'].forEach(evt=>joyWrap.addEventListener(evt,resetJoy));
}

async function startWithMode(mode){
  controlMode=mode;
  if(mode==='accelerometer'){
    const ok=await enableTilt();
    if(!ok){ controlMode='joystick'; }
  } else {
    disableTilt();
  }
  touchHud.style.display = (controlMode==='joystick') ? 'block' : 'none';
  document.getElementById('controlOverlay').classList.add('hidden');
  playing=true;
}

document.getElementById('chooseJoystick').onclick=()=>startWithMode('joystick');
document.getElementById('chooseTilt').onclick=()=>startWithMode('accelerometer');

const clock=new THREE.Clock();
let moveCooldown=0;
renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();
  moveCooldown -= dt;

  if(playing && moveCooldown<=0){
    if(keys.ArrowUp||keys.w) { move(0,-1); moveCooldown=0.14; }
    else if(keys.ArrowDown||keys.s) { move(0,1); moveCooldown=0.14; }
    else if(keys.ArrowLeft||keys.a) { move(-1,0); moveCooldown=0.14; }
    else if(keys.ArrowRight||keys.d) { move(1,0); moveCooldown=0.14; }
    else if(controlMode==='joystick' && joyState.active){
      if(Math.abs(joyState.x) > Math.abs(joyState.y)){
        if(joyState.x>0.3) { move(1,0); moveCooldown=0.16; }
        else if(joyState.x<-0.3) { move(-1,0); moveCooldown=0.16; }
      } else {
        if(joyState.y>0.3) { move(0,1); moveCooldown=0.16; }
        else if(joyState.y<-0.3) { move(0,-1); moveCooldown=0.16; }
      }
    }
    else if(controlMode==='accelerometer' && tiltState.enabled){
      const g=tiltState.gamma, b=tiltState.beta;
      if(Math.abs(g) > Math.abs(b)){
        if(g>12) { move(1,0); moveCooldown=0.16; }
        else if(g<-12) { move(-1,0); moveCooldown=0.16; }
      } else {
        if(b>14) { move(0,1); moveCooldown=0.16; }
        else if(b<-14) { move(0,-1); moveCooldown=0.16; }
      }
    }
  }

  place();
  // follow cam
  camera.position.x += (hero.position.x - camera.position.x)*Math.min(1,dt*4);
  camera.position.z += (hero.position.z + 16 - camera.position.z)*Math.min(1,dt*4);
  camera.lookAt(hero.position.x,0,hero.position.z);

  renderer.render(scene,camera);
});

function onResize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); }
addEventListener('resize', onResize);
</script>
