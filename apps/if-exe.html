<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IF.EXE</title>
<style>
body{margin:0;background:#0a1025;color:#dff1ff;font-family:'Courier New',monospace}
.wrap{max-width:1100px;margin:0 auto;padding:14px}
.top{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button{padding:8px 10px;border:1px solid #5a78bf;background:#1b2d5a;color:#fff;border-radius:8px;cursor:pointer}
canvas{width:100%;height:420px;border:2px solid #37508f;background:#071022;border-radius:10px;margin:10px 0;image-rendering:pixelated}
.line{font-size:18px;line-height:1.4;padding:10px;border:1px solid #304a86;background:#0f1a3a;border-radius:10px;min-height:66px}
.small{font-size:12px;color:#9fc0ff}a{color:#9fc0ff}
</style></head><body>
<div class="wrap">
<p><a href="#" class="back-hub" data-hub="../index.html">← Back to MichaelOS</a></p>
<h1>IF.EXE</h1>
<div class="top">
  <button id="play">▶ Play</button><button id="pause">⏸ Pause</button><button id="restart">↺ Restart</button>
  <label class="small">TTS <input id="tts" type="checkbox" checked/></label>
</div>
<canvas id="cv" width="1200" height="500"></canvas>
<div id="line" class="line">Press Play to start.</div>
<p class="small">Rudyard Kipling rendered as line-by-line pixel scenes.</p>
</div>
<script>
const lines=[
"If you can keep your head when all about you",
"Are losing theirs and blaming it on you,",
"If you can trust yourself when all men doubt you,",
"But make allowance for their doubting too;",
"If you can wait and not be tired by waiting,",
"Or being lied about, don't deal in lies,",
"Or being hated, don't give way to hating,",
"And yet don't look too good, nor talk too wise:",
"If you can dream—and not make dreams your master;",
"If you can think—and not make thoughts your aim;",
"If you can meet with Triumph and Disaster",
"And treat those two impostors just the same;",
"If you can bear to hear the truth you've spoken",
"Twisted by knaves to make a trap for fools,",
"Or watch the things you gave your life to, broken,",
"And stoop and build 'em up with worn-out tools:",
"If you can make one heap of all your winnings",
"And risk it on one turn of pitch-and-toss,",
"And lose, and start again at your beginnings",
"And never breathe a word about your loss;",
"If you can force your heart and nerve and sinew",
"To serve your turn long after they are gone,",
"And so hold on when there is nothing in you",
"Except the Will which says to them: 'Hold on!',",
"If you can talk with crowds and keep your virtue,",
"Or walk with Kings—nor lose the common touch,",
"If neither foes nor loving friends can hurt you,",
"If all men count with you, but none too much;",
"If you can fill the unforgiving minute",
"With sixty seconds' worth of distance run,",
"Yours is the Earth and everything that's in it,",
"And—which is more—you'll be a Man, my son!"
];
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const lineEl=document.getElementById('line');
let i=0,playing=false,paused=false,timer=null,voice=null;

function pickVoice(){
  const voices=speechSynthesis.getVoices?.()||[];
  const pref=['old','male','en-gb','english','daniel','fred','george'];
  let best=voices[0],score=-1;
  for(const v of voices){
    const n=(v.name+' '+v.lang).toLowerCase();
    let s=0; for(const k of pref) if(n.includes(k)) s++;
    if(s>score){score=s;best=v;}
  }
  return best||null;
}

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function sky(base='#0a1633'){
  px(0,0,cv.width,cv.height,base);
  for(let y=0;y<cv.height;y+=12){px(0,y,cv.width,6,(y%24===0)?'rgba(255,255,255,.03)':'rgba(0,0,0,.06)');}
  for(let s=0;s<45;s++) px((s*131)%cv.width,(s*71)%180,3,3,s%2?'#8fb6ff':'#dbe8ff');
}
function person(x,y,c='#6ed3ff'){
  const p=8;
  for(let r=0;r<10;r++) for(let k=0;k<8;k++) if((r===0&&k>1&&k<6)||(r>0&&r<8&&k>0&&k<7)||(r===8&&k>1&&k<6)) px(x+k*p,y+r*p,p,p,c);
}
function crown(x,y){px(x,y,70,14,'#f3c865');px(x+8,y-14,12,14,'#f3c865');px(x+28,y-20,12,20,'#f3c865');px(x+48,y-14,12,14,'#f3c865');}
function heart(x,y,c='#d94e5a'){px(x+8,y,8,8,c);px(x+24,y,8,8,c);px(x,y+8,40,24,c);px(x+8,y+32,24,8,c)}
function wrench(x,y){px(x,y,54,10,'#b3bed5');px(x+42,y+10,12,24,'#b3bed5');px(x+10,y-10,20,10,'#b3bed5')}
function coins(x,y,n=6){for(let k=0;k<n;k++) px(x+k*12,y-k*2,10,8,'#f3c865')}
function dice(x,y){px(x,y,32,32,'#fff');px(x+8,y+8,6,6,'#111');px(x+18,y+18,6,6,'#111');}
function hourglass(x,y){px(x,y,24,6,'#c8d4f1');px(x,y+44,24,6,'#c8d4f1');px(x+2,y+6,20,8,'#c8d4f1');px(x+6,y+14,12,8,'#f3c865');px(x+6,y+28,12,8,'#f3c865');px(x+2,y+36,20,8,'#c8d4f1');}

function drawScene(step){
  const text=lines[step]||'';
  sky();
  const lower=text.toLowerCase();
  px(0,380,cv.width,120,'#101b38');

  // keyword-based tableau
  if(lower.includes('kings')||lower.includes('crowds')){person(250,250,'#7fe2ff');person(180,280,'#6ec8ff');person(340,280,'#6ec8ff');crown(520,250);} 
  else if(lower.includes('dream')){person(260,280,'#7fe2ff');px(420,120,180,100,'rgba(220,230,255,.2)');px(440,140,26,26,'#f3c865');px(500,170,38,18,'#9ec4ff');}
  else if(lower.includes('disaster')||lower.includes('triumph')){person(230,280,'#7fe2ff');px(470,240,80,8,'#fff');px(500,200,18,40,'#f3c865');px(650,220,50,50,'#d9534f');}
  else if(lower.includes('broken')||lower.includes('tools')){person(260,280,'#7fe2ff');wrench(520,300);px(560,330,60,8,'#6f7a93');}
  else if(lower.includes('winnings')||lower.includes('pitch-and-toss')){person(260,280,'#7fe2ff');coins(520,320,8);dice(650,300);} 
  else if(lower.includes('heart')||lower.includes('sinew')){person(260,280,'#7fe2ff');heart(560,280);} 
  else if(lower.includes('minute')||lower.includes('seconds')){person(260,280,'#7fe2ff');hourglass(580,250);} 
  else if(lower.includes('earth')){person(260,280,'#7fe2ff');px(520,250,90,90,'#4da6ff');px(540,270,24,18,'#3c8d4c');px(575,295,18,14,'#3c8d4c');}
  else {person(260,280,'#7fe2ff');person(620,280,'#9ab7ff');}

  px(60,30,1080,100,'#14244d');
  ctx.strokeStyle='#4e6db5';ctx.strokeRect(60,30,1080,100);
  ctx.fillStyle='#e7f1ff';ctx.font='28px Courier New';
  ctx.fillText((step+1)+'. '+text.slice(0,74),82,88);
}

function speak(text,done){
  if(!document.getElementById('tts').checked){done();return;}
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(!voice) voice=pickVoice(); if(voice) u.voice=voice;
    u.rate=0.86; u.pitch=0.72;
    u.onend=()=>done(); u.onerror=()=>done();
    speechSynthesis.speak(u);
  }catch{done();}
}
function next(delay=600){clearTimeout(timer);timer=setTimeout(step,delay);}
function step(){
  if(!playing||paused) return;
  if(i>=lines.length){playing=false;return;}
  drawScene(i); lineEl.textContent=lines[i];
  speak(lines[i],()=>{const delay=((i+1)%2===0)?1200:600; i++; next(delay);});
}
function start(){if(playing&&!paused)return;playing=true;paused=false;step();}
function pause(){paused=!paused;if(paused){speechSynthesis.cancel();clearTimeout(timer);}else if(playing){next(600);}}
function restart(){speechSynthesis.cancel();clearTimeout(timer);i=0;playing=false;paused=false;lineEl.textContent='Restarted. Press Play.';drawScene(0);}

document.getElementById('play').onclick=start;
document.getElementById('pause').onclick=pause;
document.getElementById('restart').onclick=restart;
speechSynthesis.onvoiceschanged=()=>{voice=pickVoice();};
drawScene(0);

window.addEventListener('message', (ev)=>{
  const t = ev?.data?.type;
  if(t === 'mikenet-close'){
    paused=true; playing=false;
    clearTimeout(timer);
    try{ speechSynthesis.cancel(); }catch{}
  }
});

</script>
<script>/* back-hub helper */
(function(){
  document.querySelectorAll('a.back-hub').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var hub = a.getAttribute('data-hub') || '../index.html';
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = hub;
        } else {
          window.location.href = hub;
        }
      } catch (_) {
        window.location.href = hub;
      }
    });
  });
})();
</script>

</body></html>
