<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business Card Builder</title>
  
  <style>
    :root{
      --bg:#070b17;
      --bg2:#0f1730;
      --panel:#131d3d;
      --panel-2:#0f1730;
      --text:#eaf0ff;
      --muted:#9db0dd;
      --line:#2c3e73;
      --primary:#4f7dff;
      --primary-2:#6ea1ff;
      --success:#35c58b;
      --shadow:0 14px 36px rgba(3,8,20,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 600px at 10% -10%, #1f2f5f 0%, transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:28px 18px 48px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:.2rem 0 .4rem;font-size:clamp(1.6rem,3vw,2.1rem);letter-spacing:.2px}
    h3{margin:.1rem 0 .7rem;font-size:1.02rem}
    p{margin:.2rem 0 0}
    .muted{color:var(--muted);font-size:.95rem;line-height:1.45}
    a{color:#b4cbff;text-decoration:none}
    a:hover{text-decoration:underline}

    .card{
      background:linear-gradient(180deg,rgba(19,29,61,.95),rgba(15,23,48,.95));
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(4px);
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}

    label{display:block;margin-bottom:6px;font-size:.83rem;color:#bfd0f6;text-transform:uppercase;letter-spacing:.05em}
    input,select,textarea{
      width:100%;
      border:1px solid #3a4f88;
      background:#0c1330;
      color:var(--text);
      border-radius:10px;
      padding:10px 11px;
      outline:none;
      transition:.18s border-color,.18s box-shadow;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--primary-2);
      box-shadow:0 0 0 3px rgba(110,161,255,.2);
    }

    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      border:0;
      border-radius:10px;
      background:linear-gradient(135deg,var(--primary),#3d64d9);
      color:#fff;
      font-weight:700;
      padding:10px 14px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(40,88,220,.35);
      transition:transform .12s ease, filter .18s ease;
    }
    button:hover{filter:brightness(1.08)}
    button:active{transform:translateY(1px)}
    button.secondary{background:linear-gradient(135deg,#33466f,#293959);box-shadow:none}

    .item{padding:10px;border-radius:10px;background:#0c1430;border:1px solid #2d4073;margin-bottom:8px}
    pre{white-space:pre-wrap;background:#0a1026;padding:12px;border-radius:10px;border:1px solid #23325f;color:#d7e4ff;max-height:360px;overflow:auto}
    .preview{background:#fff;color:#111;border-radius:12px;padding:16px;min-height:180px;box-shadow:0 10px 30px rgba(0,0,0,.35)}

    @media (max-width:640px){body{padding:16px 12px 28px}.card{padding:14px;border-radius:14px}}
  </style>

</head>
<body>
<div class="wrap">
  <p><a href="../index.html">← Back to hub</a></p>
  <h1>Business Card Builder</h1>
  <p class="muted">Create a card profile, preview it, and export JSON for generation pipeline.</p>

  <div class="card grid">
    <div><label>Name</label><input id="name" value="Michael Costea"></div>
    <div><label>Role</label><input id="role" value="Founder"></div>
    <div><label>Company</label><input id="company" value="OZQuotes"></div>
    <div><label>Phone</label><input id="phone" value="+61 ..."></div>
    <div><label>Email</label><input id="email" value="michael@michaelcostea.com"></div>
    <div><label>Website</label><input id="website" value="michaelcostea.com"></div>
    <div><label>Style</label>
      <select id="style">
        <option>minimal</option><option>bold</option><option>playful</option><option>premium</option>
      </select>
    </div>
    <div><label>Icon Theme</label>
      <select id="icon"><option>none</option><option>lightning</option><option>gear</option><option>rocket</option><option>cube</option></select>
    </div>
    <div style="grid-column:1/-1"><label>Tagline</label><textarea id="tagline" rows="2">Automation, quotes, and execution.</textarea></div>
  </div>

  <div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button id="previewBtn">Update Preview</button>
      <button id="saveBtn">Save Profile</button>
      <button id="exportBtn">Export JSON</button>
    </div>
    <div id="preview" class="preview"></div>
  </div>
</div>
<script>
const k='mc_card_profile_v1';
const $=id=>document.getElementById(id);
function data(){
  return {
    name: $('name').value, role:$('role').value, company:$('company').value,
    phone:$('phone').value, email:$('email').value, website:$('website').value,
    style:$('style').value, icon:$('icon').value, tagline:$('tagline').value,
    updatedAt:new Date().toISOString()
  };
}
function render(){
  const d=data();
  const icon = d.icon==='none'?'':({'lightning':'⚡','gear':'⚙️','rocket':'🚀','cube':'🧊'}[d.icon]||'');
  $('preview').innerHTML = `
    <div style="font-weight:700;font-size:22px">${d.name} ${icon}</div>
    <div style="opacity:.8">${d.role} · ${d.company}</div>
    <hr />
    <div>${d.phone}</div>
    <div>${d.email}</div>
    <div>${d.website}</div>
    <div style="margin-top:10px;font-style:italic;color:#444">${d.tagline}</div>
    <div style="margin-top:8px;font-size:12px;color:#666">style: ${d.style}</div>
  `;
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(k)||'null');
    if(!d) return render();
    for(const id of ['name','role','company','phone','email','website','style','icon','tagline']) if(d[id]) $(id).value=d[id];
  }catch{}
  render();
}
$('previewBtn').onclick=render;
$('saveBtn').onclick=()=>{ localStorage.setItem(k, JSON.stringify(data())); alert('Profile saved locally'); };
$('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(data(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='business-card-profile.json'; a.click();
};
load();
</script>
</body>
</html>
