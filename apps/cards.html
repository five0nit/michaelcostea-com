<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business Card Builder</title>
  
  
  <style>
    :root{--bg:#070b17;--bg2:#0f1730;--panel:#131d3d;--text:#eaf0ff;--muted:#9db0dd;--line:#2c3e73;--primary:#4f7dff;--primary2:#6ea1ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(1000px 520px at 10% -10%,#203164 0%,transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));padding:22px 14px 40px}
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:.2rem 0 .4rem;font-size:clamp(1.5rem,3.2vw,2rem)}
    .card{background:linear-gradient(180deg,rgba(19,29,61,.96),rgba(15,23,48,.96));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 12px 28px rgba(5,10,24,.4)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    label{display:block;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;color:#bfd0f6;margin-bottom:5px}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #3b4f88;background:#0d1631;color:var(--text);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(110,161,255,.2)}
    button{padding:10px 14px;border:0;border-radius:10px;background:linear-gradient(135deg,var(--primary),#3f66df);color:#fff;font-weight:700;cursor:pointer}
    button.secondary{background:linear-gradient(135deg,#3b4f7b,#2d3d61)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .actions button{min-height:40px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .muted{color:var(--muted);font-size:.92rem;line-height:1.4}
    .item{padding:10px;border-radius:10px;background:#0f1730;border:1px solid #2a3967;margin-bottom:8px}
    a{color:#aecaFF}
    pre{white-space:pre-wrap;background:#0a1228;padding:10px;border-radius:10px;border:1px solid #24325a;max-height:340px;overflow:auto}
    .preview{background:#fff;color:#111;border-radius:10px;padding:14px;min-height:180px;box-shadow:0 8px 28px rgba(0,0,0,.35)}
    @media (max-width:680px){body{padding:14px 10px 28px}.card{padding:12px}.actions{display:grid;grid-template-columns:1fr 1fr}.actions button{width:100%}}
  </style>


</head>
<body>
<div class="wrap">
  <p><a href="../index.html">← Back to hub</a></p>
  <h1>Business Card Builder</h1>
  <p class="muted">Create a card profile, preview it, and export JSON for generation pipeline.</p>
  <div class="card"><div class="row"><span class="muted">Status: Beta demo</span><span class="muted">Best for: fast concept-to-print workflows</span></div></div>

  <div class="card grid">
    <div><label>Name</label><input id="name" value="Michael Costea"></div>
    <div><label>Role</label><input id="role" value="Founder"></div>
    <div><label>Company</label><input id="company" value="OZQuotes"></div>
    <div><label>Phone</label><input id="phone" value="+61 ..."></div>
    <div><label>Email</label><input id="email" value="michael@michaelcostea.com"></div>
    <div><label>Website</label><input id="website" value="michaelcostea.com"></div>
    <div><label>Style</label>
      <select id="style">
        <option>minimal</option><option>bold</option><option>playful</option><option>premium</option>
      </select>
    </div>
    <div><label>Icon Theme</label>
      <select id="icon"><option>none</option><option>lightning</option><option>gear</option><option>rocket</option><option>cube</option></select>
    </div>
    <div style="grid-column:1/-1"><label>Tagline</label><textarea id="tagline" rows="2">Automation, quotes, and execution.</textarea></div>
  </div>

  <div class="card">
    <div class="actions">
      <button id="previewBtn">Update Preview</button>
      <button id="saveBtn">Save Profile</button>
      <button id="exportBtn">Export JSON</button>
    </div>
    <div id="preview" class="preview"></div>
  </div>
</div>
<script>
const k='mc_card_profile_v1';
const $=id=>document.getElementById(id);
function data(){
  return {
    name: $('name').value, role:$('role').value, company:$('company').value,
    phone:$('phone').value, email:$('email').value, website:$('website').value,
    style:$('style').value, icon:$('icon').value, tagline:$('tagline').value,
    updatedAt:new Date().toISOString()
  };
}
function render(){
  const d=data();
  const icon = d.icon==='none'?'':({'lightning':'⚡','gear':'⚙️','rocket':'🚀','cube':'🧊'}[d.icon]||'');
  $('preview').innerHTML = `
    <div style="font-weight:700;font-size:22px">${d.name} ${icon}</div>
    <div style="opacity:.8">${d.role} · ${d.company}</div>
    <hr />
    <div>${d.phone}</div>
    <div>${d.email}</div>
    <div>${d.website}</div>
    <div style="margin-top:10px;font-style:italic;color:#444">${d.tagline}</div>
    <div style="margin-top:8px;font-size:12px;color:#666">style: ${d.style}</div>
  `;
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(k)||'null');
    if(!d) return render();
    for(const id of ['name','role','company','phone','email','website','style','icon','tagline']) if(d[id]) $(id).value=d[id];
  }catch{}
  render();
}
$('previewBtn').onclick=render;
$('saveBtn').onclick=()=>{ localStorage.setItem(k, JSON.stringify(data())); alert('Profile saved locally'); };
$('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(data(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='business-card-profile.json'; a.click();
};
load();
</script>
</body>
</html>
