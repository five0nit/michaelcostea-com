<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OZQuotes - Quick Quote</title>
  
  <style>
    :root{
      --bg:#070b17;
      --bg2:#0f1730;
      --panel:#131d3d;
      --panel-2:#0f1730;
      --text:#eaf0ff;
      --muted:#9db0dd;
      --line:#2c3e73;
      --primary:#4f7dff;
      --primary-2:#6ea1ff;
      --success:#35c58b;
      --shadow:0 14px 36px rgba(3,8,20,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 600px at 10% -10%, #1f2f5f 0%, transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:28px 18px 48px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:.2rem 0 .4rem;font-size:clamp(1.6rem,3vw,2.1rem);letter-spacing:.2px}
    h3{margin:.1rem 0 .7rem;font-size:1.02rem}
    p{margin:.2rem 0 0}
    .muted{color:var(--muted);font-size:.95rem;line-height:1.45}
    a{color:#b4cbff;text-decoration:none}
    a:hover{text-decoration:underline}

    .card{
      background:linear-gradient(180deg,rgba(19,29,61,.95),rgba(15,23,48,.95));
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(4px);
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}

    label{display:block;margin-bottom:6px;font-size:.83rem;color:#bfd0f6;text-transform:uppercase;letter-spacing:.05em}
    input,select,textarea{
      width:100%;
      border:1px solid #3a4f88;
      background:#0c1330;
      color:var(--text);
      border-radius:10px;
      padding:10px 11px;
      outline:none;
      transition:.18s border-color,.18s box-shadow;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--primary-2);
      box-shadow:0 0 0 3px rgba(110,161,255,.2);
    }

    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      border:0;
      border-radius:10px;
      background:linear-gradient(135deg,var(--primary),#3d64d9);
      color:#fff;
      font-weight:700;
      padding:10px 14px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(40,88,220,.35);
      transition:transform .12s ease, filter .18s ease;
    }
    button:hover{filter:brightness(1.08)}
    button:active{transform:translateY(1px)}
    button.secondary{background:linear-gradient(135deg,#33466f,#293959);box-shadow:none}

    .item{padding:10px;border-radius:10px;background:#0c1430;border:1px solid #2d4073;margin-bottom:8px}
    pre{white-space:pre-wrap;background:#0a1026;padding:12px;border-radius:10px;border:1px solid #23325f;color:#d7e4ff;max-height:360px;overflow:auto}
    .preview{background:#fff;color:#111;border-radius:12px;padding:16px;min-height:180px;box-shadow:0 10px 30px rgba(0,0,0,.35)}

    @media (max-width:640px){body{padding:16px 12px 28px}.card{padding:14px;border-radius:14px}}
  </style>

</head>
<body>
<div class="wrap">
  <p><a href="../index.html">← Back to hub</a></p>
  <h1>OZQuotes — Quick Quote Tool</h1>
  <p class="muted">Generate a rough project quote remotely and export it.</p>
  <div class="card"><div class="row"><span class="muted">Status: Beta demo</span><span class="muted">Best for: on-site quote estimation</span></div></div>

  <div class="card grid">
    <div><label>API Base</label><input id="apiBaseInput" value="https://api.michaelcostea.com/api/ozquotes" /></div>
    <div><label>API Key</label><input id="apiKeyInput" placeholder="x-api-key" /></div>
    <div><label>Connection</label><input id="conn" value="checking..." readonly /></div>
    <div><label>Customer</label><input id="customer" placeholder="Client name"></div>
    <div><label>Project Type</label>
      <select id="type"><option>Electrical</option><option>Solar</option><option>Automation</option><option>General</option></select>
    </div>
    <div><label>Labor Hours</label><input id="hours" type="number" value="8" min="0"></div>
    <div><label>Hourly Rate (AUD)</label><input id="rate" type="number" value="120" min="0"></div>
    <div><label>Materials (AUD)</label><input id="materials" type="number" value="500" min="0"></div>
    <div><label>Travel/Other (AUD)</label><input id="other" type="number" value="80" min="0"></div>
    <div><label>Margin %</label><input id="margin" type="number" value="18" min="0"></div>
    <div><label>GST %</label><input id="gst" type="number" value="10" min="0"></div>
  </div>

  <div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <button id="calc">Calculate</button>
      <button id="save">Save Draft (Remote)</button>
      <button id="loadRemote">Load Latest Remote</button>
      <button id="export">Export JSON</button>
    </div>
    <p id="status" class="muted"></p>
    <pre id="out">No quote yet.</pre>
  </div>
</div>
<script>
const k='ozquotes_draft_v1';
const pref='ozquotes_remote_prefs_v1';
const $=id=>document.getElementById(id);
const statusEl = $('status');
function n(id){ return Number($(id).value||0); }
function apiBase(){ return ($('apiBaseInput').value || '').replace(/\/$/, ''); }
function apiHeaders(){ const v=$('apiKeyInput').value.trim(); return v ? {'x-api-key': v, 'content-type':'application/json'} : {'content-type':'application/json'}; }
function setStatus(t){ statusEl.textContent=t; }
function savePrefs(){ localStorage.setItem(pref, JSON.stringify({apiBase:$('apiBaseInput').value, apiKey:$('apiKeyInput').value})); }
function loadPrefs(){ try{ const p=JSON.parse(localStorage.getItem(pref)||'null'); if(p){ if(p.apiBase) $('apiBaseInput').value=p.apiBase; if(p.apiKey) $('apiKeyInput').value=p.apiKey; }}catch{} }
async function checkConn(){ try{ const r=await fetch(`${apiBase()}/latest`, { headers: $('apiKeyInput').value.trim()?{'x-api-key':$('apiKeyInput').value.trim()}:{} }); $('conn').value = r.ok ? 'online' : `api ${r.status}`; }catch{ $('conn').value='offline'; } }

function build(){
  const labor = n('hours') * n('rate');
  const base = labor + n('materials') + n('other');
  const margin = base * (n('margin')/100);
  const subtotal = base + margin;
  const gst = subtotal * (n('gst')/100);
  const total = subtotal + gst;
  return {
    customer:$('customer').value||'Unknown',
    projectType:$('type').value,
    breakdown:{labor,materials:n('materials'),other:n('other'),base,margin,subtotal,gst,total},
    assumptions:{hours:n('hours'),rate:n('rate'),marginPct:n('margin'),gstPct:n('gst')},
    createdAt:new Date().toISOString()
  };
}
function hydrate(d){
  if(!d) return;
  $('customer').value=d.customer||'';
  $('type').value=d.projectType||'General';
  $('hours').value=d.assumptions?.hours??8;
  $('rate').value=d.assumptions?.rate??120;
  $('materials').value=d.breakdown?.materials??500;
  $('other').value=d.breakdown?.other??80;
  $('margin').value=d.assumptions?.marginPct??18;
  $('gst').value=d.assumptions?.gstPct??10;
}
function render(){ const q=build(); $('out').textContent=JSON.stringify(q,null,2); return q; }

async function saveRemote(){
  const quote = build();
  localStorage.setItem(k, JSON.stringify(quote));
  try{
    const r = await fetch(`${apiBase()}/save`, { method:'POST', headers: apiHeaders(), body: JSON.stringify(quote) });
    const txt = await r.text();
    const data = JSON.parse(txt);
    if(!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    setStatus('Saved remotely + locally.');
    $('out').textContent=JSON.stringify(data.quote,null,2);
  }catch(err){
    setStatus(`Remote save failed (${err}). Saved locally only.`);
    render();
  }
}

async function loadRemote(){
  try{
    const r = await fetch(`${apiBase()}/latest`, { headers: $('apiKeyInput').value.trim()?{'x-api-key':$('apiKeyInput').value.trim()}:{} });
    const txt = await r.text();
    const data = JSON.parse(txt);
    if(!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    if(data.quote){ hydrate(data.quote); localStorage.setItem(k, JSON.stringify(data.quote)); }
    render();
    setStatus(data.quote ? 'Loaded latest remote quote.' : 'No remote quotes yet.');
  }catch(err){
    setStatus(`Remote load failed (${err}); using local draft.`);
    const local = JSON.parse(localStorage.getItem(k)||'null');
    if(local) hydrate(local);
    render();
  }
}

function load(){
  try{ const d=JSON.parse(localStorage.getItem(k)||'null'); if(d) hydrate(d); }catch{}
  render();
  loadRemote();
}

$('calc').onclick=render;
$('save').onclick=saveRemote;
$('loadRemote').onclick=loadRemote;
$('apiBaseInput').onchange=()=>{savePrefs();checkConn();};
$('apiKeyInput').onchange=()=>{savePrefs();checkConn();};
$('export').onclick=()=>{ const q=build(); const b=new Blob([JSON.stringify(q,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='ozquote.json'; a.click(); };
loadPrefs();
checkConn();
load();
</script>
</body>
</html>
