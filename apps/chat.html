<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MichaelOS Live Chat</title>
<style>
body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#0e172f;color:#fff}
.wrap{max-width:1200px;margin:0 auto;padding:14px}
.note{font-size:13px;color:#c4d6ff;margin-bottom:10px}
iframe{width:100%;height:78vh;border:2px solid #3a4f88;border-radius:10px;background:#fff}
a{color:#9fc0ff}
</style></head><body>
<div class="wrap">
  <p><a href="#" class="back-hub" data-hub="../index.html">← Back to MichaelOS</a></p>
  <h1>Live Chat Room</h1>
  <p class="note">Public lobby for site visitors. Be respectful — this room is shared and unmoderated.</p>
  <iframe src="https://tlk.io/michaelos1989_lobby" title="MichaelOS Live Chat"></iframe>
</div>

<script>/* back-hub helper */
(function(){
  document.querySelectorAll('a.back-hub').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var hub = a.getAttribute('data-hub') || '../index.html';
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = hub;
        } else {
          window.location.href = hub;
        }
      } catch (_) {
        window.location.href = hub;
      }
    });
  });
})();
</script>

</body></html>
