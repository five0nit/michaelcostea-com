<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Notepad</title>
<style>
  :root{--panel:#c0c0c0;--hi:#fff;--lo:#7f7f7f}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#008080;font-family:"MS Sans Serif",Tahoma,sans-serif}
  .app{height:100%;padding:8px;display:flex;align-items:stretch}
  .notepad{background:var(--panel);border-top:2px solid var(--hi);border-left:2px solid var(--hi);border-right:2px solid var(--lo);border-bottom:2px solid var(--lo);width:100%;display:flex;flex-direction:column}
  .bar{display:flex;gap:12px;align-items:center;padding:4px 8px;background:#efefef;border-bottom:1px solid #9a9a9a;font-size:12px}
  .bar .menu{cursor:default}
  .toolbar{display:flex;gap:6px;padding:6px;border-bottom:1px solid #9a9a9a;background:#d9d9d9;flex-wrap:wrap}
  .btn{border-top:2px solid var(--hi);border-left:2px solid var(--hi);border-right:2px solid var(--lo);border-bottom:2px solid var(--lo);background:#cfcfcf;color:#000;padding:4px 8px;font-size:12px;cursor:pointer}
  .btn:active{border-top:2px solid var(--lo);border-left:2px solid var(--lo);border-right:2px solid var(--hi);border-bottom:2px solid var(--hi)}
  input{padding:4px 6px;border:2px inset #b3b3b3;background:#fff;font-size:12px;min-width:140px}
  textarea{flex:1;min-height:0;width:100%;border:0;outline:none;padding:10px;background:#fff;color:#000;font:14px/1.45 "Lucida Console","Courier New",monospace;resize:none}
  .status{padding:4px 8px;border-top:1px solid #9a9a9a;background:#efefef;font-size:11px;color:#333;display:flex;justify-content:space-between}
</style>
</head><body>
<div class="app">
  <section class="notepad">
    <div class="bar"><span class="menu">File</span><span class="menu">Edit</span><span class="menu">Format</span><span class="menu">View</span><span class="menu">Help</span></div>
    <div class="toolbar">
      <button class="btn" id="new">New</button>
      <button class="btn" id="saveLocal">Save</button>
      <button class="btn" id="exportTxt">Save As...</button>
      <button class="btn" id="loadIfPoem">Insert If</button>
      <input id="fname" value="note.txt" />
    </div>
    <textarea id="txt" spellcheck="false" placeholder=""></textarea>
    <div class="status"><span id="stat">Ready</span><span id="len">0 chars</span></div>
  </section>
</div>
<script>
const key='michaelos_text_v1';
const txt=document.getElementById('txt');
const stat=document.getElementById('stat');
const len=document.getElementById('len');
const load=()=>{txt.value=localStorage.getItem(key)||'';sync();};
function sync(){len.textContent=`${txt.value.length} chars`;}
async function loadFromQuery(){
  try{
    const u=new URL(location.href);
    const f=u.searchParams.get('file');
    if(!f) return;
    const r=await fetch(f);
    if(!r.ok) return;
    txt.value=await r.text();
    const name=f.split('/').pop();
    document.getElementById('fname').value=name || 'note.txt';
    sync();
  }catch{}
}
const save=()=>{localStorage.setItem(key,txt.value);stat.textContent='Saved';setTimeout(()=>stat.textContent='Ready',900)};
load(); loadFromQuery();
window.addEventListener('beforeunload',save);
document.getElementById('new').onclick=()=>{if(confirm('Clear current text?')){txt.value='';sync();}};
document.getElementById('saveLocal').onclick=save;
document.getElementById('exportTxt').onclick=()=>{const name=document.getElementById('fname').value||'note.txt';const b=new Blob([txt.value],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();};
document.getElementById('loadIfPoem').onclick=async()=>{try{const r=await fetch('./text-files/if-rudyard-kipling.txt');if(!r.ok)throw new Error('not found');txt.value=await r.text();sync();}catch{alert('Poem file not available');}};
txt.addEventListener('input',sync);
</script>
</body></html>
