<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weekend + Day Planner</title>
  
  
  <style>
    :root{--bg:#070b17;--bg2:#0f1730;--panel:#131d3d;--text:#eaf0ff;--muted:#9db0dd;--line:#2c3e73;--primary:#4f7dff;--primary2:#6ea1ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(1000px 520px at 10% -10%,#203164 0%,transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));padding:22px 14px 40px}
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:.2rem 0 .4rem;font-size:clamp(1.5rem,3.2vw,2rem)}
    .card{background:linear-gradient(180deg,rgba(19,29,61,.96),rgba(15,23,48,.96));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 12px 28px rgba(5,10,24,.4)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    label{display:block;font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;color:#bfd0f6;margin-bottom:5px}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #3b4f88;background:#0d1631;color:var(--text);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(110,161,255,.2)}
    button{padding:10px 14px;border:0;border-radius:10px;background:linear-gradient(135deg,var(--primary),#3f66df);color:#fff;font-weight:700;cursor:pointer}
    button.secondary{background:linear-gradient(135deg,#3b4f7b,#2d3d61)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .actions button{min-height:40px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .muted{color:var(--muted);font-size:.92rem;line-height:1.4}
    .item{padding:10px;border-radius:10px;background:#0f1730;border:1px solid #2a3967;margin-bottom:8px}
    a{color:#aecaFF}
    pre{white-space:pre-wrap;background:#0a1228;padding:10px;border-radius:10px;border:1px solid #24325a;max-height:340px;overflow:auto}
    .preview{background:#fff;color:#111;border-radius:10px;padding:14px;min-height:180px;box-shadow:0 8px 28px rgba(0,0,0,.35)}
    @media (max-width:680px){body{padding:14px 10px 28px}.card{padding:12px}.actions{display:grid;grid-template-columns:1fr 1fr}.actions button{width:100%}}
  </style>


</head>
<body>
<div class="wrap">
  <h1>Weekend + Day Planner</h1>
  <p class="muted">Build plan runs from UI. Uses local planner API when available.</p>
  <div class="card"><div class="row"><span class="muted">Status: Live demo</span><span class="muted">Best for: Daily planning and client scheduling</span></div></div>

  <div class="card">
    <div class="grid">
      <div><label>API Base</label><input id="apiBaseInput" value="https://api.michaelcostea.com/api/planner" /></div>
      <div><label>API Key (optional)</label><input id="apiKeyInput" placeholder="x-api-key" /></div>
      <div><label>Connection</label><input id="conn" value="checking..." readonly /></div>
      <div><label>Scope</label><select id="scope"><option value="day">day</option><option value="weekend">weekend</option></select></div>
      <div><label>Region</label><select id="region"><option value="au-nz">au-nz</option><option value="melbourne">melbourne</option><option value="all">all</option></select></div>
      <div><label>Current Location</label><input id="location" value="Queenstown" /></div>
      <div><label>Budget (AUD)</label><input id="budget" type="number" value="150" min="0" /></div>
      <div><label>Date (optional YYYY-MM-DD)</label><input id="date" placeholder="2026-03-09" /></div>
      <div><label>Flags</label>
        <div class="row">
          <label><input type="checkbox" id="rest" checked /> rest-of-today</label>
          <label><input type="checkbox" id="kids" /> kids-mode</label>
          <label><input type="checkbox" id="push" /> push-google</label>
        </div>
      </div>
    </div>
    <div class="actions" style="margin-top:12px">
      <button id="runBtn">Generate Plan</button>
      <button class="secondary" id="refreshBtn">Load Latest</button>
    </div>
    <p id="status" class="muted"></p>
  </div>

  <div class="card">
    <h3>Agenda</h3>
    <div id="agenda"></div>
  </div>

  <div class="card">
    <h3>Debug</h3>
    <pre id="debug">idle</pre>
  </div>
</div>
<script>
const prefKey='planner_remote_prefs_v1';
function apiBase(){ return (document.getElementById('apiBaseInput').value || '/api/planner').replace(/\/$/, ''); }
function apiHeaders(){
  const k = document.getElementById('apiKeyInput').value.trim();
  return k ? {'x-api-key': k} : {};
}
function savePrefs(){
  localStorage.setItem(prefKey, JSON.stringify({ apiBase: document.getElementById('apiBaseInput').value, apiKey: document.getElementById('apiKeyInput').value }));
}
function loadPrefs(){
  try{ const p=JSON.parse(localStorage.getItem(prefKey)||'null'); if(p){ if(p.apiBase) document.getElementById('apiBaseInput').value=p.apiBase; if(p.apiKey) document.getElementById('apiKeyInput').value=p.apiKey; } }catch{}
}
async function checkConn(){
  const el=document.getElementById('conn');
  try{
    const r=await fetch(`${apiBase()}/latest`, { headers: apiHeaders() });
    el.value = r.ok ? 'online' : `api ${r.status}`;
  }catch{ el.value='offline'; }
}

function render(events=[]) {
  const agenda = document.getElementById('agenda');
  agenda.innerHTML='';
  if(!events.length){ agenda.innerHTML='<p class="muted">No events yet.</p>'; return; }
  for(const e of events){
    const div=document.createElement('div');
    div.className='item';
    const link=e.source_url ? ` <a href="${e.source_url}" target="_blank">source</a>`:'';
    div.innerHTML=`<b>${e.title}</b><br>${(e.start||'').replace('T',' ').slice(0,16)} → ${(e.end||'').replace('T',' ').slice(0,16)}<br><span class='muted'>${e.location||''}${link}</span>`;
    agenda.appendChild(div);
  }
}

async function safeJsonFetch(url, options){
  const r = await fetch(url, options);
  const ct = (r.headers.get('content-type')||'').toLowerCase();
  const txt = await r.text();
  if(!r.ok) throw new Error(`HTTP ${r.status} from ${url}`);
  if(!ct.includes('application/json')) throw new Error(`Non-JSON response from ${url}`);
  try { return JSON.parse(txt); } catch { throw new Error(`Invalid JSON from ${url}`); }
}

async function loadLatest(){
  const debug=document.getElementById('debug');
  const status=document.getElementById('status');
  status.textContent='Loading latest...';
  try{
    const data=await safeJsonFetch(`${apiBase()}/latest`, { headers: apiHeaders() });
    render(data.events||[]);
    debug.textContent=JSON.stringify(data,null,2);
    status.textContent='Loaded latest plan (live API).';
  }catch(err){
    try{
      const fallback = await safeJsonFetch(`../data/latest_plan.json?v=${Date.now()}`);
      render(fallback||[]);
      debug.textContent = `API offline (${err}). Loaded static fallback from ../data/latest_plan.json\n\n` + JSON.stringify({count:(fallback||[]).length},null,2);
      status.textContent='Loaded latest plan (static fallback).';
    }catch(err2){
      status.textContent='Planner API unreachable and no fallback data loaded.';
      debug.textContent = `API offline. Run local backend for Generate Plan:\nnode server/planner-api.js\n\n${err2}`;
    }
  }
}

function localPlanFallback(payload){
  const now = new Date();
  const base = payload.date ? new Date(payload.date+'T08:00:00') : now;
  const slots = payload.scope==='weekend' ? [9,11,13,15,17] : [10,12,14,16];
  const kidTag = payload.kidsMode ? ' (kids-friendly)' : '';
  const pool = [
    `Site check${kidTag}`,
    `Quote review${kidTag}`,
    `Client callback block${kidTag}`,
    `Supplier follow-up${kidTag}`,
    `Admin + invoicing${kidTag}`,
    `Travel + setup${kidTag}`
  ];
  return slots.map((h,i)=>{
    const st = new Date(base); st.setHours(h,0,0,0);
    const en = new Date(base); en.setHours(h+1,0,0,0);
    return {
      title: pool[i%pool.length],
      start: st.toISOString(),
      end: en.toISOString(),
      location: payload.currentLocation || 'Local'
    };
  });
}

async function runPlan(){
  const payload={
    scope: document.getElementById('scope').value,
    region: document.getElementById('region').value,
    currentLocation: document.getElementById('location').value,
    budgetAud: Number(document.getElementById('budget').value||0),
    date: document.getElementById('date').value || null,
    restOfToday: document.getElementById('rest').checked,
    kidsMode: document.getElementById('kids').checked,
    pushGoogle: document.getElementById('push').checked
  };
  const status=document.getElementById('status');
  const debug=document.getElementById('debug');
  status.textContent='Running planner...';
  try{
    const data=await safeJsonFetch(`${apiBase()}/run`,{method:'POST',headers:{'content-type':'application/json', ...apiHeaders()},body:JSON.stringify(payload)});
    render(data.events||[]);
    debug.textContent=JSON.stringify(data,null,2);
    status.textContent='Plan generated (live API).';
  }catch(err){
    const events = localPlanFallback(payload);
    render(events);
    debug.textContent = `API offline fallback engaged\n\n${err}\n\n` + JSON.stringify({payload,events},null,2);
    status.textContent='Plan generated (smart local fallback mode).';
  }
}

document.getElementById('runBtn').addEventListener('click',runPlan);
document.getElementById('refreshBtn').addEventListener('click',loadLatest);
document.getElementById('apiBaseInput').addEventListener('change',()=>{savePrefs();checkConn();});
document.getElementById('apiKeyInput').addEventListener('change',()=>{savePrefs();checkConn();});
loadPrefs();
checkConn();
loadLatest();
</script>

</body>
</html>
