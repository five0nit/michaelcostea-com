<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Costea — Projects & Webapps</title>
  <meta name="description" content="Michael Costea's live playground: projects, automations, and webapps." />
  <link rel="stylesheet" href="styles.css?v=20260309-1705" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="kicker">michaelcostea.com</p>
      <h1 id="name">Michael Costea</h1>
      <p id="headline" class="headline"></p>
      <p id="summary" class="summary"></p>
    </header>

    <section class="stats" aria-label="portfolio stats">
      <div class="stat"><b id="statApps">3</b><span>Active Apps</span></div>
      <div class="stat"><b>24/7</b><span>Online Access</span></div>
      <div class="stat"><b>AU/NZ</b><span>Service Region</span></div>
    </section>

    <section class="retro-scene" aria-label="animated retro scene">
      <div class="scene-title">Live Control Deck</div>
      <div class="skyline"></div>
      <div class="windows" id="sceneWindows">
        <div class="mini-window"><span>Planner Node</span><b class="pulse">online</b></div>
        <div class="mini-window"><span>Cards Builder</span><b class="pulse">building</b></div>
        <div class="mini-window"><span>OZQuotes API</span><b class="pulse">ready</b></div>
        <div class="mini-window"><span>Automation Queue</span><b class="pulse">idle</b></div>
      </div>
      <div class="orbs" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>Current Projects & Webapps</h2>
        <p class="muted">Live playground for current + future apps</p>
      </div>
      <div id="apps" class="grid"></div>
    </section>
  </main>
  <div class="taskbar" aria-label="Windows style taskbar">
    <button id="startBtn" class="start-btn" aria-expanded="false" aria-controls="startMenu">Start</button>
    <div class="taskbar-spacer"></div>
    <div class="tray" id="tray">
      <span id="trayBattery" class="tray-pill" title="Battery">🔋 --%</span>
      <span id="trayDate" class="tray-pill" title="Date">--/--/----</span>
      <span id="trayClock" class="tray-pill" title="Time">--:-- --</span>
    </div>
  </div>

  <div id="startMenu" class="start-menu" role="menu" aria-hidden="true">
    <div class="start-head">MichaelOS 98</div>
    <div id="startItems" class="start-items"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
