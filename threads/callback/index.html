<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Threads connection · Michael Costea</title>
  <style>
    :root { color-scheme: dark; font-family: "Arial", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101010; color: #101820; }
    main { width: min(92vw, 640px); background: #f7f2e8; border: 4px solid #101820; box-shadow: 10px 10px 0 #4de2b1; }
    header { display: flex; justify-content: space-between; gap: 1rem; padding: .65rem .85rem; background: #101820; color: #fff; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    section { padding: clamp(1.4rem, 5vw, 2.7rem); }
    h1 { margin: 0 0 .8rem; font-size: clamp(1.8rem, 6vw, 3rem); line-height: .96; text-transform: uppercase; }
    p { margin: .7rem 0; line-height: 1.55; }
    .status { margin-top: 1.4rem; padding: .9rem; border: 2px solid #101820; background: #ded8cc; font-family: ui-monospace, monospace; font-weight: 700; }
    button { margin-top: 1rem; padding: .75rem 1rem; border: 2px solid #101820; background: #4de2b1; color: #101820; font: inherit; font-weight: 800; cursor: pointer; }
    button[hidden] { display: none; }
  </style>
</head>
<body>
  <main aria-labelledby="title">
    <header><span>MICHAEL OS 89</span><span>THREADS OAUTH</span></header>
    <section>
      <h1 id="title">Finishing connection</h1>
      <p>This page relays Threads’ authorization response to the local Social Engine. It does not store credentials or publish content.</p>
      <div class="status" id="status" role="status" aria-live="polite">Checking authorization response…</div>
      <button id="relay" type="button" hidden>Return to local Social Engine</button>
    </section>
  </main>
  <script src="./callback.js"></script>
</body>
</html>
